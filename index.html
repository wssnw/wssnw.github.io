<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Tropical</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-blue: #0077be;
            --sand-gold: #f2d2a9;
            --leaf-green: #2d5a27;
            --neon-glow: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #00b4db, #0083b0);
            font-family: 'Syne', sans-serif;
            height: 100vh;
        }

        /* --- THE BEACH --- */
        .beach {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25vh;
            background: var(--sand-gold);
            z-index: 5;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.1);
        }

        /* --- THE WAVES --- */
        .waves {
            position: absolute;
            bottom: 20vh;
            width: 100%;
            height: 15vh;
            z-index: 4;
        }

        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 43%;
            animation: waveFlow 10s infinite linear;
        }

        .wave:nth-child(2) {
            bottom: 2vh;
            background: rgba(0, 119, 190, 0.5);
            animation-duration: 7s;
            animation-direction: reverse;
        }

        @keyframes waveFlow {
            from { transform: translateX(0) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* --- THE PALM TREES --- */
        .palm-tree {
            position: absolute;
            bottom: 20vh;
            width: 20px;
            height: 200px;
            background: #6d4c41;
            z-index: 6;
            border-radius: 10px 10px 0 0;
            transform-origin: bottom;
            animation: sway 4s infinite ease-in-out;
        }

        .palm-tree::before {
            content: '🌴';
            font-size: 100px;
            position: absolute;
            top: -60px;
            left: -40px;
        }

        .left-tree { left: 10%; animation-delay: 0s; }
        .right-tree { right: 10%; animation-delay: 1s; }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* --- LOGO & BUTTON --- */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 15vw, 9rem);
            color: #fff;
            text-shadow: 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow);
            animation: float 4s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .release-btn {
            font-family: 'Syne', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .release-btn:hover {
            background: white;
            color: var(--sea-blue);
            transform: scale(1.1);
            letter-spacing: 10px;
        }

        /* --- COCONUTS --- */
        .coconut {
            position: absolute;
            font-size: 30px;
            z-index: 7;
            user-select: none;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="beach"></div>

    <div class="palm-tree left-tree"></div>
    <div class="palm-tree right-tree"></div>

    <div class="container">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="release-btn" onclick="location.reload()">2028</button>
    </div>

    <script>
        function dropCoconut() {
            const coconut = document.createElement('div');
            coconut.className = 'coconut';
            coconut.innerHTML = '🥥';
            
            // Randomly pick left or right tree area
            const isLeft = Math.random() > 0.5;
            coconut.style.left = isLeft ? (Math.random() * 5 + 10) + '%' : (Math.random() * 5 + 80) + '%';
            coconut.style.top = '20vh';
            
            document.body.appendChild(coconut);

            let top = 20;
            const gravity = setInterval(() => {
                top += 2;
                coconut.style.top = top + 'vh';
                
                if (top >= 85) { // Hits the sand
                    clearInterval(gravity);
                    setTimeout(() => {
                        coconut.style.opacity = '0';
                        setTimeout(() => coconut.remove(), 1000);
                    }, 2000);
                }
            }, 20);
        }

        // Drop a coconut every 5-10 seconds
        setInterval(dropCoconut, Math.random() * 5000 + 5000);
    </script>
</body>
</html>
