<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff00ff;
            --deep-black: #020202;
        }

        body {
            background: var(--deep-black);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        /* Animated Snow Background */
        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
            pointer-events: none; 
        }

        /* Professional Animated Logo */
        .main-logo {
            font-size: clamp(4rem, 15vw, 9rem);
            margin: 0;
            color: #fff;
            text-align: center;
            user-select: none;
            /* Initial Glow State */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue),
                0 0 80px var(--neon-blue);
            /* This triggers the movement and the glow shift */
            animation: proGlow 4s infinite ease-in-out;
        }

        @keyframes proGlow {
            0% {
                transform: translateY(0) scale(1);
                text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue), 0 0 80px var(--neon-blue);
                filter: brightness(1) hue-rotate(0deg);
            }
            50% {
                transform: translateY(-15px) scale(1.05);
                /* Intense Glow at peak of movement */
                text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-blue), 0 0 70px var(--neon-blue), 0 0 120px var(--neon-blue);
                filter: brightness(1.3) hue-rotate(20deg);
            }
            100% {
                transform: translateY(0) scale(1);
                text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue), 0 0 80px var(--neon-blue);
                filter: brightness(1) hue-rotate(0deg);
            }
        }

        .release-tag {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            letter-spacing: 12px;
            margin-top: 10px;
            font-size: 1.1rem;
            text-shadow: 0 0 15px var(--neon-pink);
            opacity: 0.8;
            text-transform: uppercase;
            animation: fadeInOut 3s infinite ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Discord Logo Only */
        .discord-btn {
            margin-top: 60px;
            transition: 0.5s;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .discord-btn:hover {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 25px var(--neon-blue)) brightness(1.5);
        }

        .discord-icon {
            width: 55px;
            height: auto;
            fill: #fff;
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <h1 class="main-logo">Foggy Fights</h1>
    <div class="release-tag">Releasing 2028</div>

    <a href="https://discord.gg/ff" class="discord-btn" target="_blank">
        <svg class="discord-icon" viewBox="0 0 127.14 96.36">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105.73,105.73,0,0,0,32.19,16.26,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.26c2.73-27.22-4.56-50.83-19.49-72.03ZM42.48,65.69C36.1,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.48,65.69Zm42.24,0C78.34,65.69,73.21,60,73.21,53s5-12.74,11.43-12.74S96.19,46,96.07,53,91,65.69,84.72,65.69Z"/>
        </svg>
    </a>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            for(let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 0.5,
                    v: Math.random() * 1.2 + 0.3,
                    o: Math.random() * 0.5 + 0.2
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 255, 255, ${f.o})`;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fill();
                f.y += f.v;
                if(f.y > height) { f.y = -10; f.x = Math.random() * width; }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
