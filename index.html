<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@700&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff00ff;
            --sun-gold: #ffcc00;
        }

        body {
            background: #020202;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* Main Branding */
        .hero {
            text-align: center;
            transition: opacity 0.8s ease;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 12vw, 8rem);
            margin: 0;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            animation: float 4s infinite ease-in-out;
        }

        /* Clickable Non-Cursive Text */
        .release-btn {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-pink);
            letter-spacing: 8px;
            background: none;
            border: 2px solid var(--neon-pink);
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-pink);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .release-btn:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 40px var(--neon-pink);
            transform: scale(1.1);
        }

        /* Sunray Expansion Effect */
        .sunburst {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: var(--sun-gold);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 100px 50px var(--sun-gold);
        }

        .sunburst.active {
            animation: expand 1.2s forwards ease-in;
        }

        @keyframes expand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(500); opacity: 0; }
        }

        /* Diary Section */
        .diary-section {
            display: none;
            position: absolute;
            top: 0;
            width: 100%;
            max-width: 800px;
            padding: 100px 20px;
            z-index: 5;
            background: #020202;
        }

        .diary-entry {
            margin-bottom: 80px;
            border-left: 3px solid var(--neon-blue);
            padding-left: 20px;
        }

        .diary-entry img {
            width: 100%;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #333;
        }

        .diary-date { font-family: 'Orbitron'; color: var(--neon-blue); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>
    <div class="sunburst" id="sun"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="release-btn" onclick="openDiary()">Releasing 2028</button>
    </div>

    <div class="diary-section" id="diary">
        <div class="diary-entry">
            <h2 class="diary-date">MARCH 2026</h2>
            <p>System update successful. The vision for Foggy Fights is becoming real.</p>
            <img src="Screenshot_28.png" alt="Development log">
        </div>

        <div class="diary-entry">
            <h2 class="diary-date">FUTURE LOG</h2>
            <p>Waiting for the 2028 deployment. The mist is coming.</p>
        </div>
        
        <button class="release-btn" onclick="location.reload()" style="font-size: 0.8rem;">← Back</button>
    </div>

    <script>
        function openDiary() {
            const sun = document.getElementById('sun');
            const hero = document.getElementById('hero');
            const diary = document.getElementById('diary');

            // Start Sunray effect
            sun.classList.add('active');

            // Transition content
            setTimeout(() => {
                hero.classList.add('hidden');
                diary.style.display = 'block';
                window.scrollTo(0,0);
            }, 600);
        }

        // Snow Script (Keep your existing snow)
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            for(let i=0; i<100; i++) flakes.push({x: Math.random()*width, y: Math.random()*height, r: Math.random()*2+0.5, v: Math.random()*1+0.5});
        }
        function draw() {
            ctx.clearRect(0,0,width,height);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
                f.y += f.v;
                if(f.y > height) f.y = -10;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
