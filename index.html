<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | Golden Hour Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #ffb347;
            --gold-bright: #ffd194;
            --gold-deep: #8b5a00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --sunset-orange: rgba(255, 100, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            width: 100%; height: 100%;
            background: #080500; font-family: 'Syne', sans-serif;
            color: #fff; overflow: hidden; user-select: none;
        }

        /* --- THE GOLDEN HOUR ENGINE --- */
        .atmosphere {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; pointer-events: none;
            background: radial-gradient(circle at 80% 20%, rgba(255, 180, 50, 0.15) 0%, transparent 60%),
                        linear-gradient(to bottom, transparent, rgba(139, 90, 0, 0.2));
        }

        .sun-flare {
            position: fixed; top: -10%; right: -10%; width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(255, 200, 100, 0.2) 0%, transparent 70%);
            z-index: 4; filter: blur(60px); animation: flarePulse 10s infinite alternate;
        }

        @keyframes flarePulse { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.2); opacity: 0.8; } }

        .background-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('IMG_3002.jpeg') center/cover no-repeat;
            z-index: 1; filter: sepia(0.5) saturate(1.5) brightness(0.8) contrast(1.1);
            transform: scale(1.05); transition: 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- THE "FULL" METALLIC LOGO --- */
        .logo-wrapper { perspective: 1000px; margin-bottom: 40px; z-index: 10; }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4.5rem, 18vw, 11rem);
            color: var(--gold-primary);
            position: relative;
            background: linear-gradient(to bottom, #fff 20%, var(--gold-primary) 45%, var(--gold-deep) 55%, var(--gold-bright) 85%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            filter: drop-shadow(0 0 2px rgba(0,0,0,1)) 
                    drop-shadow(0 10px 15px rgba(0,0,0,0.5))
                    drop-shadow(0 0 30px var(--sunset-orange));
            animation: float 5s ease-in-out infinite, metallicSweep 4s linear infinite;
            background-size: 200% auto;
        }

        @keyframes metallicSweep {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0) rotateX(10deg); } 
            50% { transform: translateY(-20px) rotateX(15deg); } 
        }

        /* --- GLASS BUTTONS --- */
        .btn-container { z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 25px; }

        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 22px 70px;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .glass-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold-primary);
            box-shadow: 0 0 50px rgba(255, 179, 71, 0.4);
            transform: translateY(-5px) scale(1.02);
        }

        .glass-btn:hover::before { left: 100%; }

        /* --- ROBLOX & SOCIALS --- */
        .socials { display: flex; gap: 35px; margin-top: 40px; }
        .icon { 
            width: 45px; cursor: pointer; transition: 0.3s; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }
        .icon:hover { transform: scale(1.2) rotate(5deg); filter: drop-shadow(0 0 20px var(--gold-primary)); }
        .roblox-logo { filter: invert(1) brightness(2); }

        /* --- LEGACY PAGE --- */
        .legacy-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(30, 15, 0, 0.9), #000);
            z-index: 1000; display: none; opacity: 0; transition: 2s;
            overflow-y: auto; padding: 60px 20px; flex-direction: column; align-items: center;
        }

        .polaroid-frame {
            background: #fdfdfd; padding: 15px 15px 50px 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 320px; cursor: zoom-in; margin: 20px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.6s;
            transform: rotate(var(--r));
        }

        .polaroid-frame.zoomed {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(1.8) rotate(0deg) !important;
            z-index: 2000; cursor: zoom-out; box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .polaroid-frame img { width: 100%; filter: contrast(1.1) sepia(0.2); }
        .polaroid-frame p { 
            color: #222; font-family: 'Dancing Script'; text-align: center; 
            font-size: 1.6rem; margin-top: 15px; 
        }

        /* --- AI --- */
        .ai-core {
            position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 50%; border: 1px solid var(--gold-primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 3000; transition: 0.4s;
        }
        .ai-core:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold-primary); }
        
        .ai-box {
            position: fixed; bottom: 100px; left: 30px; width: 300px;
            background: rgba(15, 10, 0, 0.95); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 20px; display: none; z-index: 3000; flex-direction: column; gap: 10px;
        }

        input { background: transparent; border: 1px solid var(--gold-primary); color: #fff; padding: 10px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

    <div class="atmosphere"></div>
    <div class="sun-flare"></div>
    <div class="background-layer" id="bg-main"></div>

    <div class="ui-container btn-container" id="home" style="height: 100vh; justify-content: center; display: flex;">
        <div class="logo-wrapper">
            <h1 class="main-logo">Foggy Fights</h1>
        </div>
        
        <button class="glass-btn" onclick="openLegacy()">Enter the Fog</button>
        
        <div class="socials">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" class="icon" onclick="alert('Discord Soon!')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="icon roblox-logo" onclick="window.open('https://www.roblox.com/communities/35978868')">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="icon" onclick="alert('TikTok Soon!')">
        </div>
    </div>

    <div class="ai-core" onclick="toggleAI()">📜</div>
    <div class="ai-box" id="ai-box">
        <p style="color: var(--gold-primary); font-weight: 900; font-size: 12px;">FOGGY CHRONICLES</p>
        <p id="ai-text" style="font-size: 13px;">What memory shall we recover today?</p>
        <input type="text" id="ai-input" placeholder="Ask about 2028..." onkeypress="handleAI(event)">
    </div>

    <div class="legacy-screen" id="legacy">
        <div style="display: flex; flex-wrap: wrap; justify-content: center; width: 100%;">
            <div class="polaroid-frame" style="--r: -3deg;" onclick="zoom(this)">
                <img src="Screenshot_22.png">
                <p>The First Spark</p>
            </div>
            <div class="polaroid-frame" style="--r: 4deg;" onclick="zoom(this)">
                <img src="RobloxScreenShot20260302_213405110.png">
                <p>Golden Era Dev</p>
            </div>
        </div>

        <div style="background: var(--glass-bg); padding: 40px; max-width: 700px; margin-top: 40px; border: 1px solid var(--glass-border); text-align: center;">
            <h2 style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--gold-primary);">The Solo Journey</h2>
            <p style="line-height: 2; color: #ddd; margin-top: 20px;">
                Inspired by the grit of <b>Da Hood</b>. A solo vision born in 2025. 
                Though life has moved the clocks, the fog will finally settle in <b>2028</b>.
            </p>
            <button class="glass-btn" style="margin-top: 30px;" onclick="location.reload()">Return Home</button>
        </div>
    </div>

    <script>
        const paperSound = new Audio('https://www.soundjay.com/misc/sounds/paper-turn-1.mp3');

        function openLegacy() {
            const bg = document.getElementById('bg-main');
            const home = document.getElementById('home');
            const leg = document.getElementById('legacy');

            bg.style.transform = "scale(150) rotate(30deg)";
            bg.style.filter = "brightness(40) blur(100px) sepia(1)";
            home.style.opacity = "0";

            setTimeout(() => {
                home.style.display = 'none';
                leg.style.display = 'flex';
                setTimeout(() => leg.style.opacity = "1", 100);
            }, 3000);
        }

        function zoom(el) {
            paperSound.currentTime = 0;
            paperSound.play();
            el.classList.toggle('zoomed');
        }

        function toggleAI() {
            const box = document.getElementById('ai-box');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function handleAI(e) {
            if(e.key === 'Enter') {
                const q = e.target.value.toLowerCase();
                const out = document.getElementById('ai-text');
                if(q.includes('release')) out.innerText = "The grand release is written for 2028.";
                else if(q.includes('hood')) out.innerText = "Da Hood was our foundation and spark.";
                else out.innerText = "The fog is too thick to see that answer yet.";
                e.target.value = "";
            }
        }
    </script>
</body>
</html>
