<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | The Golden Era</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #ffb347;
            --gold-glow: rgba(255, 179, 71, 0.4);
            --warm-white: #fffcf2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0a0600; font-family: 'Syne', sans-serif;
            color: var(--warm-white); overflow: hidden;
        }

        /* --- THE ATMOSPHERE (GOD RAYS & FOG) --- */
        .sunlight {
            position: fixed; top: -50%; left: -20%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 20deg, rgba(255, 200, 100, 0.04) 25deg 30deg);
            z-index: 5; pointer-events: none; animation: rotateRays 60s linear infinite;
            filter: blur(20px);
        }

        .volumetric-fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, var(--gold-glow), transparent 70%);
            z-index: 4; pointer-events: none; opacity: 0.6;
        }

        @keyframes rotateRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- Background --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; transform: scale(1.1);
            filter: sepia(0.5) saturate(1.5) brightness(0.8);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1), filter 3s ease;
        }

        /* --- UI Elements --- */
        .hero { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; position: relative; z-index: 10;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4.5rem, 16vw, 10rem);
            color: var(--gold);
            text-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 60px var(--gold-glow);
            animation: float 5s ease-in-out infinite;
            margin: 0; text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-15px) rotate(1deg); } }

        .btn-enter {
            padding: 22px 70px; font-weight: 900; background: rgba(0,0,0,0.4);
            border: 2px solid var(--gold); color: var(--gold);
            cursor: pointer; letter-spacing: 6px; transition: 0.5s;
            margin-top: 40px; font-size: 14px; backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 179, 71, 0.1);
        }
        .btn-enter:hover { 
            background: var(--gold); color: #000; 
            box-shadow: 0 0 50px var(--gold); transform: scale(1.05);
        }

        /* --- ROBLOX LOGO FIXED --- */
        .socials { display: flex; gap: 30px; margin-top: 50px; align-items: center; }
        .s-icon { 
            width: 42px; height: 42px; cursor: pointer; transition: 0.4s;
            filter: drop-shadow(0 0 10px var(--gold));
        }
        .s-icon:hover { transform: translateY(-10px) scale(1.2); }
        
        .roblox-silver {
            filter: invert(1) brightness(1.5) drop-shadow(0 0 5px #fff) !important;
        }

        /* --- LEGACY PAGE --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; display: none; z-index: 10003; 
            overflow-y: auto; padding: 80px 20px;
            flex-direction: column; align-items: center; opacity: 0;
            transition: 2s ease;
        }

        .photo {
            background: #fffef0; padding: 12px 12px 45px 12px;
            width: 300px; box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            transform: rotate(var(--r)); margin: 20px;
            transition: 0.5s;
        }
        .photo:hover { transform: rotate(0deg) scale(1.1); z-index: 50; }
        .photo img { width: 100%; filter: contrast(1.1) sepia(0.2); }
        .photo p { color: #333; font-family: 'Dancing Script'; margin-top: 15px; font-size: 1.5rem; text-align: center; }

        .legacy-content {
            max-width: 850px; width: 100%; text-align: center;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px);
            padding: 50px; border: 1px solid rgba(255, 179, 71, 0.15);
            margin-top: 40px; box-shadow: 0 0 80px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="sunlight"></div>
    <div class="volumetric-fog"></div>
    <div class="bg-img" id="bg"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-enter" onclick="godlyEnter()">ENTER THE FOG</button>
        
        <div class="socials">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" class="s-icon" onclick="alert('Discord Soon!')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" 
                 class="s-icon roblox-silver" 
                 onclick="window.open('https://www.roblox.com/communities/35978868')">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="s-icon" onclick="alert('TikTok Soon!')">
        </div>
    </div>

    <div class="heaven-logs" id="logs">
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <div class="photo" style="--r: -3deg;">
                <img src="Screenshot_22.png">
                <p>The First Spark</p>
            </div>
            <div class="photo" style="--r: 4deg;">
                <img src="RobloxScreenShot20260302_213405110.png">
                <p>Golden Dreams</p>
            </div>
        </div>

        <div class="legacy-content">
            <h2 style="font-family:'Dancing Script'; font-size: 4rem; color: var(--gold); margin-bottom: 20px;">The Legacy</h2>
            <p style="font-size: 1.3rem; line-height: 2.2; color: #ddd; text-align: center;">
                Inspired by the gritty soul of <b style="color:var(--gold);">Da Hood</b>.<br><br>
                What started as a solo mission in 2025 has become a lifelong project. 
                Quality takes time, and the fog is set to clear in <b style="color:var(--gold);">2028</b>.
            </p>
            <button class="btn-enter" onclick="location.reload()" style="margin-top: 50px;">BACK TO START</button>
        </div>
        <div style="height: 150px;"></div>
    </div>

    <script>
        function godlyEnter() {
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');

            // Camera Shake & Zoom
            bg.style.transform = "scale(150) rotate(20deg)";
            bg.style.filter = "brightness(50) blur(100px) sepia(1.5)";
            hero.style.opacity = "0";
            hero.style.transform = "scale(0.8)";

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'flex';
                document.body.style.overflowY = 'auto';
                setTimeout(() => { logs.style.opacity = "1"; }, 100);
            }, 3000); 
        }
    </script>
</body>
</html>
