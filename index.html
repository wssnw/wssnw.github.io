<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-blue: #00d2ff;
            --glow-pink: #ff00ff;
        }

        body {
            background: #050505;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        /* Snow Overlay */
        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
            pointer-events: none;
        }

        .main-logo {
            font-size: clamp(4rem, 15vw, 9rem);
            margin: 0;
            color: #fff;
            text-shadow: 
                0 0 10px #fff, 
                0 0 20px var(--glow-blue), 
                0 0 40px var(--glow-blue),
                0 0 80px var(--glow-blue);
            animation: pulse 3s infinite ease-in-out;
            user-select: none;
        }

        .release-tag {
            font-family: 'Orbitron', sans-serif;
            color: var(--glow-pink);
            letter-spacing: 15px;
            margin-top: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 15px var(--glow-pink);
            opacity: 0.9;
            text-transform: uppercase;
        }

        /* Smooth Breathing Animation */
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                filter: brightness(1);
            }
            50% { 
                transform: scale(1.03); 
                filter: brightness(1.3);
            }
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .release-tag {
                letter-spacing: 5px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <h1 class="main-logo">Foggy Fights</h1>
    <div class="release-tag">Releasing in KYS 2418 </div>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            // Create 120 snow particles
            for(let i = 0; i < 120; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 0.5, // Size
                    v: Math.random() * 1 + 0.5, // Speed
                    o: Math.random() * 0.5 + 0.2 // Opacity
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            flakes.forEach(f => {
                ctx.fillStyle = `rgba(255, 255, 255, ${f.o})`;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fill();
                
                // Move snow down
                f.y += f.v;
                
                // Reset flake to top if it leaves screen
                if(f.y > height) {
                    f.y = -10;
                    f.x = Math.random() * width;
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); 
        draw();
    </script>
</body>
</html>
