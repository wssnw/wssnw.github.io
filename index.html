<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-blue: #00d2ff;
            --glow-pink: #ff00ff;
        }

        body {
            background: #050505;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        /* Snow Canvas Overlay */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .main-logo {
            font-size: 8rem;
            margin: 0;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--glow-blue), 0 0 60px var(--glow-blue);
            animation: pulse 2.5s infinite ease-in-out;
            cursor: default;
        }

        .release-tag {
            font-family: 'Orbitron', sans-serif;
            color: var(--glow-pink);
            letter-spacing: 12px;
            margin-top: 30px;
            font-size: 1.2rem;
            text-shadow: 0 0 15px var(--glow-pink);
            opacity: 0.8;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <h1 class="main-logo">Foggy Fights</h1>
    
    <div class="release-tag">RELEASING 2028</div>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            for(let i=0; i<100; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 0.5,
                    v: Math.random() * 1 + 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.v;
                if(f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); 
        draw();
    </script>
</body>
</html>
