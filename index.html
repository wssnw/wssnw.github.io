<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --heaven-white: #ffffff;
            --gold-glow: #ffdfba;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0221;
            font-family: 'Syne', sans-serif;
        }

        /* --- THE MASTER IMAGE --- */
        .bg-img {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.1) brightness(0.7);
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1), filter 1s;
        }

        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        /* --- THE LOGO --- */
        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            margin: 0;
            text-shadow: 
                0 0 15px #fff,
                0 0 30px var(--neon-pink),
                0 0 60px var(--neon-pink),
                0 0 100px var(--neon-pink);
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); }
        }

        /* --- THE "ENTER THE FOG" BUTTON --- */
        .btn-fog {
            margin-top: 150px;
            padding: 25px 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 
                        inset 0 0 20px rgba(255,255,255,0.2);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-fog:hover {
            letter-spacing: 18px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 60px var(--neon-pink), 0 0 20px #fff;
            transform: translateY(-5px);
        }

        /* --- THE TELEPORTATION SUNRAYS (FIXED GLOW) --- */
        .sunray-burst {
            position: fixed;
            top: 50%; left: 50%;
            width: 300vw; height: 300vw; /* Massively oversized to prevent edges showing */
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                #fff 5%,
                transparent 12%,
                #fff 25%,
                transparent 40%,
                #fff 55%,
                transparent 70%,
                #fff 85%,
                transparent 100%
            );
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            /* The secret sauce: heavy blur + mix-blend-mode */
            filter: blur(15px); 
            mix-blend-mode: screen;
        }

        .sunray-burst.active {
            animation: teleportFlash 1.8s forwards ease-in;
        }

        @keyframes teleportFlash {
            0% { 
                transform: translate(-50%, -50%) scale(0) rotate(0deg); 
                opacity: 0; 
            }
            20% { opacity: 1; }
            80% { opacity: 1; filter: blur(30px) brightness(2); }
            100% { 
                transform: translate(-50%, -50%) scale(1.5) rotate(180deg); 
                opacity: 0; 
            }
        }
        
        /* --- THE HEAVEN LOGS --- */
        .heaven-logs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(to bottom, #fff, var(--gold-glow));
            display: none;
            z-index: 1000;
            overflow-y: auto;
            color: #222;
            padding: 80px 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .log-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
            animation: fadeInUp 1.2s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry {
            margin-bottom: 60px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 20px;
        }

        .log-date { font-weight: 600; color: #888; font-size: 0.9rem; letter-spacing: 2px; }
        .log-title { font-family: 'Syne'; font-size: 2.5rem; margin: 10px 0; color: #000; }
        .log-body { font-size: 1.1rem; line-height: 1.8; color: #444; }

    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="sunray-burst" id="ray"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="ascend()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="log-container">
            <div class="log-entry">
                <div class="log-date">ENTRY #001 // 2026</div>
                <h2 class="log-title">THE GENESIS</h2>
                <p class="log-body">The vision is locked. We are building the atmosphere, the fight, and the fog. This is the start of the 2028 cycle.</p>
            </div>

            <div class="log-entry">
                <div class="log-date">ENTRY #002 // FUTURE</div>
                <h2 class="log-title">BEYOND THE MIST</h2>
                <p class="log-body">Everything you see here is a fragment of the final world. Stay tuned to the frequency.</p>
            </div>

            <button onclick="location.reload()" style="background:none; border:1px solid #000; color:#000; padding:15px 30px; cursor:pointer; font-family:'Syne'; letter-spacing:5px; margin-top:40px;">RETURN TO MIST</button>
        </div>
    </div>

    <script>
        function ascend() {
            const ray = document.getElementById('ray');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');
            const bg = document.getElementById('bg');

            // 1. Kick off the Sunray Warp
            ray.classList.add('active');
            
            // 2. Explode the Background (No more quadrat/square look)
            bg.style.filter = 'brightness(20) contrast(0.2) blur(20px)';
            bg.style.transform = 'scale(4)';
            hero.style.opacity = '0';
            
            // 3. Switch to the bright heaven logs
            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 1000);
        }
    </script>
</body>
</html>
