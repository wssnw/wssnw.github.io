<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --heaven-white: #ffffff;
            --gold-glow: #ffdfba;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0221;
            font-family: 'Syne', sans-serif;
        }

        /* --- ATMOSPHERE: FLOATING DUST --- */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 2; opacity: 0.3; pointer-events: none;
        }

        .bg-img {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1; filter: contrast(1.1) brightness(0.6) blur(2px);
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1), filter 2s;
        }

        .hero {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff; text-align: center;
            filter: drop-shadow(0 0 20px var(--neon-pink)) drop-shadow(0 0 50px var(--neon-pink));
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        .btn-fog {
            margin-top: 150px; padding: 25px 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #fff; text-transform: uppercase; letter-spacing: 15px;
            cursor: pointer; backdrop-filter: blur(30px);
            transition: 0.5s; z-index: 20;
        }

        .btn-fog:hover {
            letter-spacing: 20px; background: #fff; color: #000;
            box-shadow: 0 0 80px var(--neon-pink);
        }

        /* --- THE HEAVENLY TELEPORT (NO RECTANGLES) --- */
        .warp-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; pointer-events: none; opacity: 0;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            mix-blend-mode: overlay;
        }

        .sunrays {
            position: fixed; top: 50%; left: 50%; width: 400vw; height: 400vw;
            background: conic-gradient(from 0deg, transparent 0%, #fff 2%, transparent 4%, #fff 8%, transparent 15%, #fff 30%, transparent 50%);
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000; pointer-events: none; opacity: 0;
            filter: blur(40px) brightness(1.5); /* Massive blur kills the choppiness */
        }

        .active-warp { animation: raysExpand 1.5s forwards cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes raysExpand {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(180deg); opacity: 0; }
        }

        /* --- DIARY / LOGS SECTION --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #fff; display: none; z-index: 1100;
            overflow-y: auto; padding: 100px 20px; color: #111;
        }

        .diary-grid {
            max-width: 1000px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .polaroid {
            background: #fff; padding: 15px 15px 60px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transform: rotate(-2deg); transition: 0.4s;
            border: 1px solid #eee;
        }

        .polaroid:nth-child(even) { transform: rotate(3deg); }

        .polaroid:hover {
            transform: rotate(0deg) translateY(-20px) scale(1.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .polaroid img {
            width: 100%; height: 250px; object-fit: cover;
            filter: sepia(0.2) contrast(1.1);
        }

        .polaroid-caption {
            font-family: 'Dancing Script'; font-size: 1.5rem;
            margin-top: 20px; color: #444;
        }

    </style>
</head>
<body>

    <div class="particles"></div>
    <div class="bg-img" id="bg"></div>
    <div class="warp-overlay" id="overlay"></div>
    <div class="sunrays" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="teleport()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="diary-grid">
            <div class="polaroid">
                <img src="https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg" alt="Entry 1">
                <div class="polaroid-caption">Where it all started...</div>
                <p style="font-family: 'Inter'; font-size: 0.9rem; color: #888;">ENTRY #001 // THE VISION</p>
            </div>
            
            <div class="polaroid">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800" alt="Entry 2">
                <div class="polaroid-caption">The Fog is coming.</div>
                <p style="font-family: 'Inter'; font-size: 0.9rem; color: #888;">ENTRY #002 // ATMOSPHERE</p>
            </div>
        </div>

        <center>
            <button onclick="location.reload()" style="margin-top: 100px; background: none; border: 1px solid #000; padding: 15px 40px; cursor:pointer;">LEAVE HEAVEN</button>
        </center>
    </div>

    <script>
        function teleport() {
            const rays = document.getElementById('rays');
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');
            const overlay = document.getElementById('overlay');

            // Start the Warp
            rays.classList.add('active-warp');
            overlay.style.opacity = '1';
            
            // Blow out background
            bg.style.filter = 'brightness(15) blur(30px)';
            bg.style.transform = 'scale(5)';
            hero.style.opacity = '0';

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 1100);
        }
    </script>
</body>
</html>
