<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --sakura-light: #ffd1dc;
            --sakura-deep: #ffb7c5;
            --white-glow: rgba(255, 255, 255, 0.9);
            --paper: #fdfaf0;
            --heaven-glow: 0 0 20px rgba(255, 45, 149, 0.6), 0 0 40px rgba(0, 242, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.1);
            --map-ui: #00f2ff;
        }

        /* --- core reset --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020008; font-family: 'Syne', sans-serif; color: white; overflow: hidden; }

        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2,0,8,0.4), rgba(2,0,8,0.9)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; transform: scale(1.05);
            transition: transform 7s cubic-bezier(0.22, 1, 0.36, 1), filter 5s ease;
        }

        /* --- Titles --- */
        .main-logo {
            font-family: 'Dancing Script', cursive; color: white; text-align: center;
            font-size: clamp(3.8rem, 16vw, 11rem); z-index: 10;
            animation: floating 4s ease-in-out infinite, rgbPulse 5s linear infinite;
        }

        @keyframes rgbPulse {
            0%, 100% { filter: drop-shadow(0 0 15px #ff0000); }
            33% { filter: drop-shadow(0 0 15px #00f2ff); }
            66% { filter: drop-shadow(0 0 15px #48ff00); }
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- Glassy Map Overlay --- */
        #map-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: none; z-index: 3000; justify-content: center; align-items: center;
            opacity: 0; transition: 0.5s ease;
        }

        .map-window {
            width: 95%; max-width: 900px; height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }

        .map-header {
            padding: 20px; background: rgba(0, 242, 255, 0.1);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        .map-title { font-size: 1.2rem; letter-spacing: 4px; font-weight: 900; color: var(--map-ui); }

        .map-canvas {
            flex-grow: 1; position: relative;
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            overflow: hidden;
        }

        /* --- Map Locations (The "Buttons") --- */
        .poi {
            position: absolute; width: 100px; height: 40px;
            border: 1px solid var(--map-ui); background: rgba(0, 242, 255, 0.05);
            color: var(--map-ui); font-size: 0.65rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .poi:hover {
            background: var(--map-ui); color: black;
            box-shadow: 0 0 20px var(--map-ui); transform: scale(1.1);
        }

        .poi::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 1px solid var(--map-ui); animation: poiPulse 2s infinite;
        }

        @keyframes poiPulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.4); opacity: 0; } }

        /* --- Map Pings (Click Effect) --- */
        .ping {
            position: absolute; width: 10px; height: 10px; background: var(--map-ui);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            animation: pingExpand 1s ease-out forwards;
        }
        @keyframes pingExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(15); opacity: 0; }
        }

        /* --- UI Elements --- */
        .btn-fancy {
            margin: 10px; padding: 15px 30px; border: 2px solid white;
            background: rgba(255, 255, 255, 0.1); color: white; cursor: pointer;
            letter-spacing: 5px; font-weight: 900; transition: 0.4s;
            backdrop-filter: blur(5px); text-transform: uppercase;
        }
        .btn-fancy:hover { background: white; color: black; box-shadow: 0 0 30px white; }

        .hero { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Leaf System (Kept from original) */
        .leaf { position: fixed; top: -10%; z-index: 5; background: linear-gradient(135deg, var(--sakura-light), var(--sakura-deep)); clip-path: polygon(50% 15%, 70% 0%, 100% 20%, 90% 60%, 50% 100%, 10% 60%, 0% 20%, 30% 0%); animation: fallSway linear infinite; opacity: 0.8; pointer-events: none; }
        @keyframes fallSway { 0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; } 15% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(720deg) translateX(120px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div id="leaf-container"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fancy" onclick="godlyEnter()">ENTER THE FOG</button>
        <button class="btn-fancy" style="border-color: var(--map-ui); color: var(--map-ui);" onclick="toggleMap(true)">TACTICAL MAP</button>
        <div style="opacity: 0.4; font-size: 0.7rem; margin-top: 20px;">made by wssnw</div>
    </div>

    <div id="map-overlay">
        <div class="map-window">
            <div class="map-header">
                <div class="map-title">REGION: DA HOOD // 2028</div>
                <button onclick="toggleMap(false)" style="background: none; border: 1px solid var(--map-ui); color: var(--map-ui); padding: 5px 15px; cursor: pointer; font-weight: 900;">EXIT</button>
            </div>
            
            <div class="map-canvas" id="mapCanvas">
                <div class="poi" style="top: 20%; left: 45%;" onclick="mapPing(event)">Bank</div>
                <div class="poi" style="top: 10%; left: 10%;" onclick="mapPing(event)">Uphill</div>
                <div class="poi" style="top: 80%; left: 10%;" onclick="mapPing(event)">Downhill</div>
                <div class="poi" style="top: 45%; left: 45%; border-color: #ff2d95; color: #ff2d95;" onclick="mapPing(event)">Park</div>
                <div class="poi" style="top: 30%; right: 15%;" onclick="mapPing(event)">Casino</div>
                <div class="poi" style="bottom: 25%; left: 40%;" onclick="mapPing(event)">Gas Station</div>
                <div class="poi" style="top: 60%; right: 10%;" onclick="mapPing(event)">Warehouse</div>
                <div class="poi" style="bottom: 15%; right: 30%;" onclick="mapPing(event)">Boxing Ring</div>
                <div class="poi" style="top: 50%; left: 15%;" onclick="mapPing(event)">Playground</div>
                <div class="poi" style="bottom: 5%; right: 5%; width: 150px; height: 60px; border-style: dashed;" onclick="mapPing(event)">Beach</div>
                
                <div style="position: absolute; bottom: 20px; left: 20px; font-family: monospace; font-size: 0.6rem; opacity: 0.5; color: var(--map-ui);">
                    LAT: 34.0522<br>LONG: -118.2437<br>SCANNING...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sakura system
        const leafContainer = document.getElementById('leaf-container');
        function createLeaf() {
            if (document.hidden) return;
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            leaf.style.left = Math.random() * 100 + 'vw';
            const size = (Math.random() * 10 + 15) + 'px';
            leaf.style.width = size;
            leaf.style.height = (parseFloat(size) * 1.2) + 'px';
            leaf.style.animationDuration = (Math.random() * 4 + 4) + 's';
            leafContainer.appendChild(leaf);
            setTimeout(() => leaf.remove(), 10000);
        }
        setInterval(createLeaf, 500);

        // Map Functions
        function toggleMap(show) {
            const map = document.getElementById('map-overlay');
            if(show) {
                map.style.display = 'flex';
                setTimeout(() => map.style.opacity = "1", 10);
            } else {
                map.style.opacity = "0";
                setTimeout(() => map.style.display = 'none', 500);
            }
        }

        function mapPing(e) {
            const canvas = document.getElementById('mapCanvas');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const ping = document.createElement('div');
            ping.classList.add('ping');
            ping.style.left = x + 'px';
            ping.style.top = y + 'px';
            canvas.appendChild(ping);
            
            setTimeout(() => ping.remove(), 1000);
        }

        function godlyEnter() {
            document.getElementById('bg').style.transform = "scale(2.2) rotate(5deg)";
            document.getElementById('bg').style.filter = "brightness(4) blur(40px)";
            document.getElementById('hero').style.opacity = "0";
            // ... (rest of your existing logic for the logs)
            setTimeout(() => { alert("Transitioning to logs..."); }, 1500);
        }
    </script>
</body>
</html>
