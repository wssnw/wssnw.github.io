<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --ocean: #004e92;
            --sand: #e6be8a;
            --sunset: #ff7e5f;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000;
            font-family: 'Syne', sans-serif;
        }

        /* --- ATMOSPHERIC BACKDROP --- */
        .sky {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #020111 0%, #191621 30%, #0083b0 70%, #ff7e5f 100%);
            z-index: 1;
        }

        /* --- THE LOGO: LIQUID RADIANCE --- */
        .logo-wrap {
            position: absolute; top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100; text-align: center;
            pointer-events: none;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 15vw, 12rem);
            color: #fff;
            margin: 0;
            filter: drop-shadow(0 0 15px var(--neon)) drop-shadow(0 0 50px var(--neon));
            animation: breathe 5s infinite ease-in-out;
            white-space: nowrap;
        }

        /* --- CINEMATIC OCEAN --- */
        .ocean-depths {
            position: absolute; bottom: 0; width: 100%; height: 45vh;
            background: linear-gradient(180deg, rgba(0,78,146,0.8) 0%, rgba(2,1,17,1) 100%);
            z-index: 5;
        }

        .water-surface {
            position: absolute; top: -20px; width: 200%; height: 60px;
            background: rgba(255,255,255,0.15);
            filter: blur(8px);
            border-radius: 50%;
            animation: tideWave 8s infinite alternate ease-in-out;
        }

        /* --- REALISTIC PALM TREES (SILHOUETTES) --- */
        .palm-group {
            position: absolute; bottom: 15vh; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 5%; box-sizing: border-box; z-index: 20;
        }

        .palm {
            font-size: 180px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            animation: windSway 6s infinite ease-in-out alternate;
            transform-origin: bottom center;
            user-select: none;
        }

        /* --- THE SHORE: TEXTURED BEACH --- */
        .beach-floor {
            position: absolute; bottom: 0; width: 100%; height: 22vh;
            background: var(--sand);
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); /* Subtle texture */
            z-index: 10;
            box-shadow: inset 0 25px 50px rgba(0,0,0,0.4);
        }

        /* --- ANIMATIONS --- */
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 20px var(--neon)); }
            50% { transform: scale(1.05); filter: brightness(1.3) drop-shadow(0 0 60px var(--neon)); }
        }

        @keyframes windSway {
            from { transform: rotate(-3deg) skewX(-1deg); }
            to { transform: rotate(3deg) skewX(1deg); }
        }

        @keyframes tideWave {
            from { transform: translateX(-10%) scaleY(0.8); opacity: 0.2; }
            to { transform: translateX(5%) scaleY(1.2); opacity: 0.5; }
        }

        /* --- CLICKABLE ACTION --- */
        .btn-2028 {
            margin-top: 20px;
            padding: 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            letter-spacing: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 200;
        }

        .btn-2028:hover {
            background: #fff; color: #000; letter-spacing: 20px; transform: scale(1.1);
        }

        /* --- DYNAMIC COCONUTS --- */
        .coconut-phys {
            position: absolute; font-size: 45px; z-index: 50;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4));
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sky"></div>

    <div class="logo-wrap">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-2028" onclick="location.reload()">2028</button>
    </div>

    <div class="ocean-depths">
        <div class="water-surface"></div>
    </div>

    <div class="beach-floor"></div>

    <div class="palm-group">
        <div class="palm">🌴</div>
        <div class="palm" style="transform: scaleX(-1); animation-delay: -3s;">🌴</div>
    </div>

    <script>
        function dropCoconut() {
            const c = document.createElement('div');
            c.className = 'coconut-phys';
            c.innerHTML = '🥥';
            
            // Random tree position
            const side = Math.random() > 0.5 ? 8 : 85;
            c.style.left = (side + Math.random() * 5) + '%';
            c.style.top = '15vh';
            document.body.appendChild(c);

            let y = 15;
            let vel = 0;
            let rot = 0;
            const grav = 0.5;

            const fall = setInterval(() => {
                vel += grav;
                y += vel;
                rot += vel * 2;
                c.style.top = y + 'vh';
                c.style.transform = `rotate(${rot}deg)`;

                if (y >= 80) { // Impact
                    clearInterval(fall);
                    
                    // Bounce logic
                    vel = -vel * 0.25;
                    if (Math.abs(vel) > 1) {
                        y = 79.5;
                    }

                    setTimeout(() => {
                        c.style.transition = 'opacity 2s, transform 2s';
                        c.style.opacity = '0';
                        c.style.transform += ' translateY(20px)';
                        setTimeout(() => c.remove(), 2000);
                    }, 5000);
                }
            }, 30);
        }

        // Loop drops
        function loop() {
            setTimeout(() => { dropCoconut(); loop(); }, Math.random() * 7000 + 3000);
        }
        loop();
    </script>
</body>
</html>
