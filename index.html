<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --shadow: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Syne', sans-serif;
        }

        /* --- THE IMAGE BACKGROUND (HOTLINKED) --- */
        .bg-layer {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            /* Direct link to your provided image */
            background: url('https://lh3.googleusercontent.com/drive-viewer/AKGpihbR_YvYp8-UfD3C3Qe_Bqf_XfJ6_oGzXm6h_u1p4z6e_I1k_S1t_X_4v_V_1=w1920-h1080') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.5) contrast(1.2) saturate(1.1);
            animation: slowPan 30s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -1%); }
        }

        /* --- THE FOG LAYER --- */
        .fog-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0.25;
            pointer-events: none;
            animation: drift 40s infinite linear;
        }

        @keyframes drift {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- VIGNETTE (THE CINEMATIC LOOK) --- */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 150px 50px #000;
            z-index: 3;
            pointer-events: none;
        }

        /* --- THE LOGO: LIQUID RADIANCE --- */
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4.5rem, 16vw, 11rem);
            color: #fff;
            margin: 0;
            filter: drop-shadow(0 0 15px var(--neon-blue)) drop-shadow(0 0 45px var(--neon-blue));
            animation: breathe 5s infinite ease-in-out;
            user-select: none;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1) blur(0px); }
            50% { transform: scale(1.03); filter: brightness(1.3) blur(0.5px); }
        }

        /* --- ACTION BUTTON --- */
        .btn-2028 {
            margin-top: 15px;
            padding: 12px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-2028:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            letter-spacing: 22px;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.4);
        }

    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="fog-overlay"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-2028" onclick="location.reload()">2028</button>
    </div>

</body>
</html>
