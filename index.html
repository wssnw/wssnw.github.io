<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #050505;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        .logo-container {
            text-align: center;
        }

        .logo {
            font-size: 8rem;
            color: #fff;
            text-decoration: none;
            cursor: default;
            /* The Blue Glow Effect */
        
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #00d2ff,
                0 0 82px #00d2ff,
                0 0 92px #00d2ff,
                0 0 102px #00d2ff,
                0 0 151px #00d2ff;
            /* Running both Flicker and Pulse animations */
            animation: flicker 2s infinite alternate, pulse 3s infinite ease-in-out;
        }

        /* Animation 1: Random Neon Flicker */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 
                    0 0 7px #fff,
                    0 0 10px #fff,
                    0 0 21px #fff,
                    0 0 42px #00d2ff,
                    0 0 82px #00d2ff,
                    0 0 92px #00d2ff,
                    0 0 102px #00d2ff,
                    0 0 151px #00d2ff;
            }
            20%, 24%, 55% {       
                text-shadow: none;
                color: #111;
            }
        }

        /* Animation 2: Gentle Breathing Pulse */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            font-family: sans-serif;
            color: #00d2ff;
            letter-spacing: 5px;
            font-size: 0.8rem;
            margin-top: -20px;
            opacity: 0.6;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1 class="logo">Foggy Fights</h1>
        <p class="subtitle">Enter the Niggerland</p>
    </div>

</body>
</html>
