<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Ultra Realistic</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-deep: #004e92;
            --sea-foam: #80deea;
            --sand-wet: #c2a382;
            --sand-dry: #e6be8a;
            --neon: #00f2ff;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #001a2d; }

        /* --- THE SKY: ATMOSPHERIC HAZE --- */
        .sky {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #001f3f 0%, #0083b0 50%, #ffdfba 100%);
            z-index: 1;
        }

        /* --- THE OCEAN: SVG DISPLACEMENT WAVES --- */
        .ocean-container {
            position: absolute; bottom: 15vh; width: 100%; height: 35vh;
            z-index: 5; overflow: hidden;
        }

        .water {
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,119,190,0.8) 0%, rgba(0,78,146,1) 100%);
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400"><path d="M0 100 Q400 50 800 100 T1600 100 V400 H0 Z" /></svg>');
            animation: waveMotion 6s ease-in-out infinite alternate;
        }

        @keyframes waveMotion {
            from { transform: translateY(10px) scaleY(1); }
            to { transform: translateY(-10px) scaleY(1.05); }
        }

        /* --- THE SHORELINE: FOAM & WET SAND --- */
        .shoreline {
            position: absolute; bottom: 18vh; width: 100%; height: 40px;
            background: rgba(255,255,255,0.4);
            filter: blur(10px);
            z-index: 6;
            animation: tide 8s infinite ease-in-out;
        }

        @keyframes tide {
            0%, 100% { transform: scaleY(0.5) translateY(20px); opacity: 0.3; }
            50% { transform: scaleY(1.2) translateY(-10px); opacity: 0.6; }
        }

        /* --- THE BEACH: TEXTURED SAND --- */
        .beach {
            position: absolute; bottom: 0; width: 100%; height: 25vh;
            background: var(--sand-dry);
            background-image: 
                radial-gradient(circle at 50% 0%, var(--sand-wet) 30%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/sandpaper.png');
            z-index: 7;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.3);
        }

        /* --- PALM TREES: INDEPENDENT LEAF SWAY --- */
        .palm {
            position: absolute; bottom: 20vh; z-index: 8;
            width: 180px; height: 400px;
        }

        .trunk {
            width: 30px; height: 100%; background: #5d4037;
            margin: 0 auto; clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
            background: linear-gradient(90deg, #3e2723, #6d4c41, #3e2723);
        }

        .leaves {
            position: absolute; top: -50px; left: -60px; font-size: 150px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: wind 5s infinite ease-in-out alternate;
            transform-origin: center bottom;
        }

        @keyframes wind {
            from { transform: rotate(-5deg) skewX(-2deg); }
            to { transform: rotate(5deg) skewX(2deg); }
        }

        /* --- THE LOGO: LIQUID NEON --- */
        .logo-box {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; text-align: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 12rem);
            color: #fff;
            margin: 0;
            filter: drop-shadow(0 0 20px var(--neon)) drop-shadow(0 0 60px var(--neon));
            animation: liquidGlow 4s infinite alternate ease-in-out;
            user-select: none;
        }

        @keyframes liquidGlow {
            0% { text-shadow: 0 0 10px #fff, 0 0 30px var(--neon); filter: hue-rotate(0deg); }
            100% { text-shadow: 0 0 20px #fff, 0 0 80px var(--neon); filter: hue-rotate(15deg); transform: scale(1.03); }
        }

        /* --- COCONUT PHYSICS --- */
        .coconut {
            position: absolute; font-size: 40px; z-index: 15;
            filter: drop-shadow(5px 15px 10px rgba(0,0,0,0.5));
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sky"></div>

    <div class="ocean-container">
        <div class="water"></div>
        <div class="shoreline"></div>
    </div>

    <div class="beach"></div>

    <div class="palm" style="left: 5%;">
        <div class="leaves">🌴</div>
        <div class="trunk"></div>
    </div>
    <div class="palm" style="right: 5%; transform: scaleX(-1);">
        <div class="leaves">🌴</div>
        <div class="trunk"></div>
    </div>

    <div class="logo-box">
        <h1 class="main-logo">Foggy Fights</h1>
        <p style="font-family:'Syne'; color:white; letter-spacing:15px; opacity:0.8; margin-top: -20px;">EST. 2028</p>
    </div>

    <script>
        function spawnCoconut() {
            const coco = document.createElement('div');
            coco.className = 'coconut';
            coco.innerHTML = '🥥';
            
            const startX = Math.random() > 0.5 ? 12 : 82;
            coco.style.left = startX + '%';
            coco.style.top = '20vh';
            document.body.appendChild(coco);

            let y = 20;
            let vel = 0;
            const grav = 0.6;

            const fall = setInterval(() => {
                vel += grav;
                y += vel;
                coco.style.top = y + 'vh';

                if (y >= 82) { // Hit the sand
                    clearInterval(fall);
                    coco.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                    
                    // Realistic bounce
                    vel = -vel * 0.2;
                    if (Math.abs(vel) > 1) {
                        y = 81.5;
                    }

                    // Sinking into sand
                    setTimeout(() => {
                        coco.style.transition = 'all 2s ease';
                        coco.style.opacity = '0';
                        coco.style.transform += ' translateY(10px)';
                        setTimeout(() => coco.remove(), 2000);
                    }, 4000);
                }
            }, 30);
        }

        // Random coconut drop timing
        function scheduleNext() {
            setTimeout(() => {
                spawnCoconut();
                scheduleNext();
            }, Math.random() * 8000 + 4000);
        }
        scheduleNext();
    </script>
</body>
</html>
