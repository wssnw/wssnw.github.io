<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --neon-blue: #00f2ff; 
            --sunset-purple: #7000ff;
            --white-glow: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #020008;
            font-family: 'Syne', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* --- BACKGROUND --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2,0,8,0.5), rgba(2,0,8,0.9)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover;
            z-index: 1; transition: 5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- SLOW GODLY WARP --- */
        .ray-box {
            position: fixed; top: 50%; left: 50%;
            width: 250vmax; height: 250vmax;
            transform: translate(-50%, -50%) scale(0);
            background: conic-gradient(from 0deg, transparent 0, var(--white-glow) 5deg, transparent 15deg, var(--white-glow) 30deg, transparent 50deg);
            filter: blur(60px) brightness(2) drop-shadow(0 0 40px var(--neon-pink));
            opacity: 0; z-index: 9999; pointer-events: none;
        }
        .ray-active { animation: slowGodWarp 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes slowGodWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2) rotate(180deg); opacity: 0; }
        }

        /* --- SECTION ENGINE --- */
        .page-container {
            position: relative; z-index: 100;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .section {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: #020008;
            padding: 40px;
        }

        .active { display: flex !important; animation: pageIn 1s forwards; }

        @keyframes pageIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        @keyframes pageOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }

        /* --- RGB DYNAMIC TEXT --- */
        .rgb-story {
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            font-weight: 900;
            text-align: center;
            line-height: 1.5;
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rgbShift 6s linear infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            max-width: 800px;
        }

        @keyframes rgbShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* --- BUTTONS --- */
        .btn-glow {
            margin-top: 30px; padding: 18px 50px;
            background: none; border: 2px solid #fff;
            color: #fff; font-weight: 900; letter-spacing: 5px;
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .btn-glow:hover {
            background: #fff; color: #000;
            box-shadow: 0 0 50px var(--neon-blue);
            transform: translateY(-5px);
        }

        /* --- MEMORY CARDS --- */
        .diary-card {
            background: white; padding: 10px 10px 50px 10px;
            width: 320px; box-shadow: 0 0 40px var(--neon-pink);
            transform: rotate(-2deg); transition: 0.5s;
        }
        .diary-card:hover { transform: scale(1.1) rotate(2deg); }

        .social-link img {
            width: 50px; margin: 0 20px; filter: invert(1);
            transition: 0.3s;
        }
        .social-link img:hover { transform: scale(1.3); filter: invert(1) drop-shadow(0 0 15px var(--neon-blue)); }

    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="ray-box" id="rays"></div>

    <div class="page-container">

        <div class="section active" id="start-page" style="background:transparent;">
            <h1 style="font-family:'Dancing Script'; font-size: clamp(4rem, 15vw, 10rem); text-shadow: 0 0 40px var(--neon-pink);">Foggy Fights</h1>
            <button class="btn-glow" onclick="enterFog()">ENTER THE FOG</button>
        </div>

        <div class="section" id="gallery-page">
            <h2 style="font-size: 3rem; margin-bottom: 40px; text-shadow: 0 0 20px var(--neon-blue);">MEMORIES</h2>
            <div class="diary-card">
                <div style="height:300px; background:url('Screenshot_28.png') center/cover;"></div>
                <p style="color:black; font-family:'Dancing Script'; text-align:center; font-size: 1.8rem;">08/15/25</p>
            </div>
            <button class="btn-glow" onclick="navTo('story-page')">EXPLORE STORY</button>
            <button class="btn-glow" style="border:none; font-size: 0.8rem;" onclick="navTo('start-page')">BACK TO START</button>
        </div>

        <div class="section" id="story-page">
            <p class="rgb-story">
                Inspired by Da Hood.<br>
                Alone at 13. Solo dev.<br>
                Target: 2025 → 2026 → 2028.<br>
                The journey is long, but the fog is home.
            </p>
            
            <div style="margin-top:40px;">
                <a class="social-link" href="https://tiktok.com/@melody" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
                <a class="social-link" href="https://instagram.com/promethazine" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
                <a class="social-link" href="https://www.roblox.com/users/3295874241/profile" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1018/1018285.png" title="patched404"></a>
            </div>

            <button class="btn-glow" onclick="navTo('gallery-page')">BACK TO MEMORIES</button>
        </div>

    </div>

    <script>
        function enterFog() {
            // Start the massive 5-second warp
            document.getElementById('rays').classList.add('ray-active');
            document.getElementById('bg').style.transform = "scale(15) rotate(20deg)";
            document.getElementById('bg').style.filter = "brightness(40) blur(100px)";
            
            // Fade out start page
            document.getElementById('start-page').style.animation = "pageOut 1.5s forwards";

            setTimeout(() => {
                navTo('gallery-page');
            }, 2000); // Transitions into the next page mid-warp
        }

        function navTo(nextId) {
            // Hide all sections
            const sections = document.querySelectorAll('.section');
            sections.forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });

            // Show target section
            const next = document.getElementById(nextId);
            next.style.display = 'flex';
            setTimeout(() => {
                next.classList.add('active');
            }, 10);

            // Special: Reset BG if going back to start
            if(nextId === 'start-page') {
                document.getElementById('bg').style.transform = "scale(1)";
                document.getElementById('bg').style.filter = "brightness(0.6)";
                document.getElementById('rays').classList.remove('ray-active');
            }
        }
    </script>
</body>
</html>
