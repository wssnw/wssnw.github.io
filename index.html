<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --heaven-glow: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050112;
            font-family: 'Syne', sans-serif;
        }

        /* --- BACKGROUND --- */
        .bg-img {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.2) brightness(0.6);
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1), filter 1.5s;
        }

        /* --- NEON LOGO --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            text-shadow: 
                0 0 10px #fff,
                0 0 30px var(--neon-pink),
                0 0 60px var(--neon-pink),
                0 0 100px var(--neon-pink);
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        /* --- CRYSTAL GLASS BUTTON --- */
        .btn-fog {
            margin-top: 140px;
            padding: 25px 80px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 20px;
            cursor: pointer;
            /* High-Refraction Glass */
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.2);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-fog:hover {
            letter-spacing: 30px;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 80px var(--neon-pink);
            transform: translateY(-10px);
        }

        /* --- HEAVEN RAYS (FIXED: NO RECTANGLE) --- */
        .ray-container {
            position: fixed;
            top: 50%; left: 50%;
            width: 500vw; height: 500vw; /* Massive size to hide edges */
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255,255,255,0.8) 5deg,
                transparent 15deg,
                rgba(255,255,255,0.9) 30deg,
                transparent 50deg,
                rgba(255,255,255,0.8) 70deg,
                transparent 90deg
            );
            filter: blur(60px); /* Massive blur for high quality bloom */
        }

        .ray-active {
            animation: heavenWarp 1.8s forwards ease-in;
        }

        @keyframes heavenWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* --- DIARY SECTION --- */
        .heaven-logs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #fff;
            display: none;
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .diary-card {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }

        .diary-image {
            width: 100%;
            height: 500px;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            border: 15px solid #fff; /* Polaroid look */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .diary-text {
            padding: 40px;
            font-family: 'Inter';
            color: #333;
        }
    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="ray-container" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="diary-card">
            <div class="diary-image"></div>
            <div class="diary-text">
                <h1 style="font-family:'Syne'; text-transform:uppercase; letter-spacing:5px;">Entry #001 // The Beach</h1>
                <p style="font-size: 1.2rem; line-height: 1.8;">The fog settled over the palms today. Everything feels like a dream from 2028. We are officially in the zone.</p>
                <button onclick="location.reload()" style="background:#000; color:#fff; border:none; padding:15px 30px; cursor:pointer; font-family:'Syne'; margin-top:30px;">BACK TO REALITY</button>
            </div>
        </div>
    </div>

    <script>
        function warp() {
            const rays = document.getElementById('rays');
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');

            // Trigger Massive Rays
            rays.classList.add('ray-active');
            
            // Blow out background
            bg.style.filter = 'brightness(15) blur(40px) saturate(0)';
            bg.style.transform = 'scale(6)';
            hero.style.opacity = '0';

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 1200);
        }
    </script>
</body>
</html>
