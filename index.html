<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --sakura-light: #ffd1dc;
            --sakura-deep: #ffb7c5;
            --paper: #fdfaf0;
            --heaven-glow: 0 0 30px rgba(255, 45, 149, 0.5), 0 0 60px rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020008; font-family: 'Syne', sans-serif;
            color: white; overflow: hidden;
        }

        /* --- BRINGING BACK THE VIBE --- */
        #live-clock {
            position: fixed; top: 20px; right: 20px;
            font-weight: 900; font-family: 'Inter', sans-serif;
            font-size: 1.2rem; z-index: 5000;
            text-shadow: 0 0 10px var(--neon-pink);
            animation: rgbPulse 3s linear infinite;
        }

        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2,0,8,0.3), rgba(2,0,8,0.8)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; transform: scale(1.1);
            transition: transform 8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- SAKURA PETALS (RESTORED) --- */
        .leaf {
            position: fixed; top: -10%; z-index: 5;
            width: 15px; height: 18px;
            background: linear-gradient(135deg, var(--sakura-light), var(--sakura-deep));
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
            animation: fallSway linear infinite; opacity: 0.6;
        }

        @keyframes fallSway {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        /* --- GLITCH & SHAKE --- */
        @keyframes rgbPulse {
            0%, 100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            33% { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
            66% { color: #48ff00; text-shadow: 0 0 15px #48ff00; }
        }

        @keyframes cardShake {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 15vw, 9rem);
            animation: floating 4s ease-in-out infinite, rgbPulse 6s linear infinite;
            z-index: 10; text-align: center;
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- MEMORY STACK --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(2, 0, 8, 0.92); backdrop-filter: blur(25px);
            display: none; z-index: 1000; overflow-y: scroll; padding: 80px 20px;
            flex-direction: column; align-items: center; opacity: 0; transition: 0.6s;
        }

        .diary-card {
            position: relative; background: var(--paper); padding: 12px 12px 55px 12px;
            box-shadow: var(--heaven-glow);
            animation: cardShake 0.1s infinite alternate;
            margin-bottom: 40px; width: 100%; max-width: 380px;
            cursor: pointer; transition: 0.3s;
        }

        .diary-card:hover { animation-play-state: paused; transform: scale(1.05) rotate(0deg); }
        
        .diary-card img { width: 100%; height: 250px; object-fit: cover; background: #000; }

        .card-caption {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            color: #111; text-align: center; font-weight: 900; font-family: 'Inter';
        }

        .tape {
            position: absolute; top: -15px; left: 50%; width: 90px; height: 35px;
            background: rgba(255, 45, 149, 0.6); transform: translateX(-50%) rotate(-4deg);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        /* --- BUTTONS & HUD --- */
        .btn-fancy {
            margin: 10px; padding: 15px 35px; border: 3px solid white;
            background: transparent; color: white; cursor: pointer;
            font-weight: 900; text-transform: uppercase; letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-fancy:hover { background: white; color: black; box-shadow: 0 0 20px white; }

        #ttt-box {
            margin-top: 20px; padding: 20px; border: 2px solid var(--neon-pink);
            background: rgba(0,0,0,0.8); box-shadow: var(--heaven-glow);
        }
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 210px; margin: 15px auto; }
        .cell {
            aspect-ratio: 1/1; border: 2px solid #fff; display: flex;
            align-items: center; justify-content: center; font-size: 2rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="live-clock">00:00:00</div>
    <div class="bg-img" id="bg"></div>
    <div id="leaf-container"></div>

    <div class="hero" id="hero" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; z-index:10;">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fancy" onclick="godlyEnter()">ENTER THE FOG</button>
    </div>

    <div class="heaven-logs" id="logs">
        <h2 class="main-logo" style="font-size: 3rem;">MEMORIES</h2>
        
        <div class="diary-card" onclick="window.open('https://www.roblox.com/communities/35978868/Foggy-Fights-Entertainment#!/about', '_blank')">
            <div class="tape"></div>
            <img src="https://tr.rbxcdn.com/180day-6799581898748367980/150/150/Image/Webp" style="object-fit: contain; background: white;">
            <div class="card-caption">CLICK TO JOIN COMMUNITY</div>
        </div>

        <div class="diary-card" style="animation-delay: 0.05s;">
            <div class="tape" style="background: rgba(0, 242, 255, 0.6);"></div>
            <img src="Screenshot_22.png">
            <div class="card-caption">THE GRIND IS REAL</div>
        </div>

        <button class="btn-fancy" onclick="openStory()">STORY & GAME</button>
        <button class="btn-fancy" onclick="location.reload()">BACK</button>
    </div>

    <div class="heaven-logs" id="story">
        <h2 class="main-logo" style="font-size: 2.5rem;">THE SOLO PATH</h2>
        <div style="max-width: 500px; text-align: center; line-height: 1.8; font-family: 'Inter'; font-weight: 700;">
            Started this at 13. Solo dev. <br>
            They wanted it in '25, then '26... but I'm building a legacy. <br>
            Release set for 2028. We don't stop.
        </div>

        <div id="ttt-box">
            <div id="ttt-status" style="text-align:center; font-weight:900; color:var(--neon-pink); margin-bottom: 10px;">THE ROBOT IS WATCHING</div>
            <div class="ttt-grid">
                <div class="cell" onclick="userMove(0)"></div>
                <div class="cell" onclick="userMove(1)"></div>
                <div class="cell" onclick="userMove(2)"></div>
                <div class="cell" onclick="userMove(3)"></div>
                <div class="cell" onclick="userMove(4)"></div>
                <div class="cell" onclick="userMove(5)"></div>
                <div class="cell" onclick="userMove(6)"></div>
                <div class="cell" onclick="userMove(7)"></div>
                <div class="cell" onclick="userMove(8)"></div>
            </div>
            <button onclick="resetGame()" style="width:100%; padding:10px; font-weight:900;">RESET</button>
        </div>
        <button class="btn-fancy" onclick="backToLogs()" style="margin-top:20px;">BACK TO MEMORIES</button>
    </div>

    <script>
        function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000); updateClock();

        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 4 + 3) + 's';
            document.getElementById('leaf-container').appendChild(leaf);
            setTimeout(() => leaf.remove(), 6000);
        }
        setInterval(createLeaf, 500);

        function godlyEnter() {
            document.getElementById('bg').style.transform = "scale(2.5) blur(20px)";
            document.getElementById('hero').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('hero').style.display = 'none';
                const l = document.getElementById('logs');
                l.style.display = 'flex'; setTimeout(() => l.style.opacity = "1", 50);
            }, 8000); // Slow cinematic transition
            document.getElementById('bg').style.transition = "transform 8s ease-in-out";
        }

        function openStory() { document.getElementById('logs').style.display='none'; const s=document.getElementById('story'); s.style.display='flex'; setTimeout(()=>s.style.opacity="1",50); }
        function backToLogs() { document.getElementById('story').style.display='none'; document.getElementById('logs').style.display='flex'; }

        // --- UNBEATABLE AI ---
        let board = ["","","","","","","","",""], active = true;
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function userMove(i) {
            if(board[i] === "" && active) {
                board[i] = "X"; render();
                if(!checkWin(board, "X") && board.includes("")) {
                    active = false; setTimeout(aiMove, 600);
                }
            }
        }

        function aiMove() {
            let bestScore = -Infinity, move;
            for(let i=0; i<9; i++) {
                if(board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if(score > bestScore) { bestScore = score; move = i; }
                }
            }
            board[move] = "O"; active = true; render(); checkWin(board, "O");
        }

        function minimax(b, d, isMax) {
            if(checkWin(b, "O", true)) return 10;
            if(checkWin(b, "X", true)) return -10;
            if(!b.includes("")) return 0;
            if(isMax) {
                let best = -Infinity;
                for(let i=0; i<9; i++) { if(b[i]===""){ b[i]="O"; best=Math.max(best, minimax(b, d+1, false)); b[i]=""; } }
                return best;
            } else {
                let best = Infinity;
                for(let i=0; i<9; i++) { if(b[i]===""){ b[i]="X"; best=Math.min(best, minimax(b, d+1, true)); b[i]=""; } }
                return best;
            }
        }

        function checkWin(b, p, silent=false) {
            for(let c of wins) {
                if(b[c[0]]===p && b[c[1]]===p && b[c[2]]===p) {
                    if(!silent) { document.getElementById('ttt-status').innerText = "THE MACHINE WINS"; active = false; }
                    return true;
                }
            }
            if(!b.includes("") && !silent) { document.getElementById('ttt-status').innerText = "IT'S A DRAW"; active = false; }
            return false;
        }

        function render() {
            const cells = document.getElementsByClassName('cell');
            for(let i=0; i<9; i++) cells[i].innerText = board[i];
        }

        function resetGame() {
            board = ["","","","","","","","",""]; active = true;
            document.getElementById('ttt-status').innerText = "THE ROBOT IS WATCHING"; render();
        }
    </script>
</body>
</html>
