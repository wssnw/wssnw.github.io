<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff2d95; --neon-blue: #00f2ff; --sunset-purple: #7000ff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050112;
            font-family: 'Syne', sans-serif;
        }

        /* --- START PAGE BG (FIXED TO .JPEG) --- */
        .bg-img {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            /* Updated extension to .jpeg */
            background: #050112 url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover;
            z-index: 1; filter: contrast(1.1) brightness(0.7);
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1), filter 2s;
        }

        .hero {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 15vw, 10rem);
            color: #fff; text-align: center;
            text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.3); }
        }

        .btn-fog {
            margin-top: 50px; padding: 25px 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #fff; color: #fff;
            text-transform: uppercase; letter-spacing: 15px;
            cursor: pointer; backdrop-filter: blur(20px);
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.3);
        }

        .btn-fog:hover {
            letter-spacing: 20px; background: #fff; color: #000;
            box-shadow: 0 0 50px var(--sunset-purple), 0 0 20px var(--neon-pink);
        }

        /* --- MASSIVE HEAVEN RAYS --- */
        .ray-box {
            position: fixed; top: 50%; left: 50%;
            width: 1200vw; height: 1200vw;
            transform: translate(-50%, -50%) scale(0);
            background: conic-gradient(from 0deg, transparent 0, #fff 10deg, transparent 20deg, #fff 45deg, transparent 70deg);
            filter: blur(100px) brightness(2.5);
            z-index: 999; pointer-events: none; opacity: 0;
        }

        .ray-active { animation: warp 2.2s forwards ease-in; }

        @keyframes warp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2) rotate(350deg); opacity: 0; }
        }

        /* --- HEAVEN / MEMORY SECTION --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0faff 100%);
            display: none; z-index: 1000;
            align-items: center; justify-content: center;
        }

        .diary-card {
            position: relative; width: 90%; max-width: 600px;
            background: #fff; padding: 20px 20px 100px 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            animation: windSway 6s infinite ease-in-out;
        }

        @keyframes windSway {
            0%, 100% { transform: rotate(-1deg) translateY(0); }
            50% { transform: rotate(1deg) translateY(-20px); }
        }

        .tape-sticker {
            position: absolute; top: -25px; left: 50%;
            width: 140px; height: 50px;
            background: rgba(255, 45, 149, 0.4);
            backdrop-filter: blur(4px); transform: translateX(-50%) rotate(-2deg);
            z-index: 10;
        }

        .diary-img-box {
            width: 100%; height: 400px;
            background: url('Screenshot_28.png') no-repeat center center;
            background-size: cover;
            border: 1px solid #eee;
            animation: neonPulse 3s infinite alternate;
        }

        @keyframes neonPulse {
            from { filter: saturate(1) brightness(1) drop-shadow(0 0 0px var(--neon-pink)); }
            to { filter: saturate(1.5) brightness(1.2) drop-shadow(0 0 25px var(--neon-pink)); }
        }

        .diary-text {
            font-family: 'Dancing Script'; font-size: 2.2rem;
            text-align: center; margin-top: 25px; color: #222;
        }

        .date-stamp {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #ff2d95;
            text-align: center;
            margin-top: 5px;
            transform: rotate(-2deg);
        }
    </style>
</head>
<body>

    <audio id="wind" loop><source src="https://www.soundjay.com/nature/wind-01.mp3" type="audio/mpeg"></audio>

    <div class="bg-img" id="bg"></div>
    <div class="ray-box" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="diary-card">
            <div class="tape-sticker"></div>
            <div class="diary-img-box"></div>
            <div class="diary-text">Memory Found</div>
            <div class="date-stamp">08/15/25</div>
            <button onclick="location.reload()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); border:1px solid #000; background:none; cursor:pointer; padding:8px 20px; font-family: 'Inter'; font-weight:600; letter-spacing:1px;">RETURN</button>
        </div>
    </div>

    <script>
        function warp() {
            const wind = document.getElementById('wind');
            wind.volume = 0.2; wind.play().catch(() => {});

            document.getElementById('rays').classList.add('ray-active');
            document.getElementById('bg').style.transform = "scale(10) rotate(15deg)";
            document.getElementById('bg').style.filter = "brightness(30) blur(50px)";
            document.getElementById('hero').style.opacity = "0";

            setTimeout(() => {
                document.getElementById('hero').style.display = 'none';
                document.getElementById('logs').style.display = 'flex';
                document.body.style.background = "#fff";
            }, 1600);
        }  
    </script>
</body>
</html>
