<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --neon-blue: #00f2ff; 
            --sunset-purple: #7000ff;
            --glow-white: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #050112;
            font-family: 'Syne', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- START PAGE BG --- */
        .bg-img {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background: #050112 url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover;
            z-index: 1; filter: contrast(1.2) brightness(0.6);
            transition: transform 5s cubic-bezier(0.19, 1, 0.22, 1), filter 3s;
        }

        /* --- FALLING LEAVES SYSTEM --- */
        .leaf {
            position: fixed; top: -50px;
            width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px 15px 2px 15px; /* Leaf shape */
            z-index: 5; pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        .hero {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 15vw, 10rem);
            text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px var(--neon-pink)); }
            50% { transform: scale(1.03); filter: brightness(1.4) drop-shadow(0 0 30px var(--neon-pink)); }
        }

        .btn-fog {
            margin-top: 50px; padding: 25px 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #fff; color: #fff;
            text-transform: uppercase; letter-spacing: 15px;
            cursor: pointer; backdrop-filter: blur(20px);
            transition: 0.5s;
            box-shadow: 0 0 30px var(--sunset-purple);
        }

        .btn-fog:hover {
            letter-spacing: 20px; background: #fff; color: #000;
            box-shadow: 0 0 60px var(--neon-blue), 0 0 100px var(--sunset-purple);
        }

        /* --- HYPER-VISIBLE SLOW RAYS --- */
        .ray-box {
            position: fixed; top: 50%; left: 50%;
            width: 2000vw; height: 2000vw;
            transform: translate(-50%, -50%) scale(0);
            background: conic-gradient(
                from 0deg, 
                transparent 0, 
                var(--glow-white) 2deg, 
                transparent 8deg, 
                var(--glow-white) 15deg, 
                transparent 25deg,
                var(--glow-white) 40deg,
                transparent 60deg
            );
            filter: blur(60px) brightness(2);
            z-index: 999; pointer-events: none; opacity: 0;
        }

        .ray-active { animation: superWarp 5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        @keyframes superWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(90deg); opacity: 0; }
        }

        /* --- HEAVEN SECTION --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #050112 0%, #1a0b2e 100%);
            display: none; z-index: 1000;
            overflow-y: auto; padding: 80px 0;
            flex-direction: column; align-items: center;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 60px; width: 90%; max-width: 1200px;
            margin-bottom: 80px;
        }

        .diary-card {
            position: relative; background: #fff; padding: 15px 15px 60px 15px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            border-radius: 2px;
        }

        .diary-card:hover { 
            transform: translateY(-15px) rotate(2deg); 
            box-shadow: 0 0 50px var(--neon-pink);
        }

        .tape {
            position: absolute; top: -20px; left: 50%; width: 130px; height: 45px;
            background: rgba(255, 45, 149, 0.6); backdrop-filter: blur(5px);
            transform: translateX(-50%) rotate(-3deg);
            box-shadow: 0 0 20px var(--neon-pink);
            z-index: 10;
        }

        .img-box {
            width: 100%; height: 320px; background: #111;
            background-size: cover; background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .main-img { 
            background-image: url('Screenshot_28.png'); 
            animation: hyperGlow 3s infinite alternate; 
        }
        
        @keyframes hyperGlow {
            from { filter: saturate(1.2) brightness(1); box-shadow: 0 0 10px transparent; }
            to { filter: saturate(1.8) brightness(1.3); box-shadow: 0 0 40px var(--neon-pink); }
        }

        .empty-slot { display: flex; align-items: center; justify-content: center; color: #444; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .memory-info { font-family: 'Dancing Script'; font-size: 1.8rem; color: #111; text-align: center; margin-top: 20px; }

        /* --- SOCIALS & NAVIGATION --- */
        .social-box { text-align: center; padding: 60px; background: rgba(255,255,255,0.05); width: 100%; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .social-link { 
            display: inline-block; margin: 15px 25px; color: #fff; 
            text-decoration: none; font-weight: 800; font-size: 1.1rem;
            letter-spacing: 3px; transition: 0.3s;
            text-shadow: 0 0 10px var(--neon-blue);
        }
        .social-link:hover { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }

        .nav-btn {
            padding: 15px 45px; border: 2px solid #fff; background: none;
            color: #fff; cursor: pointer; font-family: 'Syne'; font-weight: 800;
            margin: 20px; transition: 0.3s; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .nav-btn:hover { background: #fff; color: #000; box-shadow: 0 0 40px #fff; }

    </style>
</head>
<body>

    <audio id="wind" loop><source src="https://www.soundjay.com/nature/wind-01.mp3" type="audio/mpeg"></audio>

    <div class="bg-img" id="bg"></div>
    <div class="ray-box" id="rays"></div>
    <div id="leaf-container"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <h2 style="color:#fff; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 60px; text-shadow: 0 0 30px var(--neon-blue);">MEMORIES FOUND</h2>
        
        <div class="memory-grid">
            <div class="diary-card">
                <div class="tape"></div>
                <div class="img-box main-img"></div>
                <div class="memory-info">08/15/25</div>
            </div>
            
            <div class="diary-card">
                <div class="tape" style="background:var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);"></div>
                <div class="img-box empty-slot">Memory Locked</div>
                <div class="memory-info">??/??/??</div>
            </div>

            <div class="diary-card">
                <div class="tape"></div>
                <div class="img-box empty-slot">Memory Locked</div>
                <div class="memory-info">??/??/??</div>
            </div>

            <div class="diary-card">
                <div class="tape" style="background:var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);"></div>
                <div class="img-box empty-slot">Memory Locked</div>
                <div class="memory-info">??/??/??</div>
            </div>
        </div>

        <div>
            <button class="nav-btn" onclick="alert('Searching deeper into the fog...')">EXPLORE MORE</button>
            <button class="nav-btn" onclick="location.reload()">BACK TO START</button>
        </div>

        <div class="social-box">
            <a href="https://instagram.com/promethazine" target="_blank" class="social-link">INSTAGRAM</a>
            <a href="https://tiktok.com/@melody" target="_blank" class="social-link">TIKTOK</a>
            <a href="#" onclick="alert('Coming Soon')" class="social-link">DISCORD SERVER</a>
        </div>
    </div>

    <script>
        // CREATE FALLING LEAVES
        const leafContainer = document.getElementById('leaf-container');
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 5 + 5 + 's';
            leaf.style.opacity = Math.random();
            leafContainer.appendChild(leaf);
            setTimeout(() => { leaf.remove(); }, 10000);
        }
        setInterval(createLeaf, 300);

        function warp() {
            const wind = document.getElementById('wind');
            wind.volume = 0.2; wind.play().catch(() => {});

            document.getElementById('rays').classList.add('ray-active');
            document.getElementById('bg').style.transform = "scale(15) rotate(30deg)";
            document.getElementById('bg').style.filter = "brightness(50) blur(80px)";
            document.getElementById('hero').style.opacity = "0";

            setTimeout(() => {
                document.getElementById('hero').style.display = 'none';
                document.getElementById('logs').style.display = 'flex';
                // Change background to dark for better glow
                document.body.style.background = "#050112";
            }, 2500); // Slower transition for beauty
        }  
    </script>
</body>
</html>
