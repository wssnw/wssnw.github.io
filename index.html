<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --glass-white: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050112;
            font-family: 'Syne', sans-serif;
        }

        /* --- MAIN BACKGROUND --- */
        .bg-img {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: url('Screenshot_28.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.2) brightness(0.6);
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1), filter 1.5s;
        }

        /* --- NEON LOGO --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 30px var(--neon-pink), 0 0 70px var(--neon-pink), 0 0 120px var(--neon-pink);
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        /* --- CRYSTAL GLASS BUTTON --- */
        .btn-fog {
            margin-top: 140px;
            padding: 25px 80px;
            background: var(--glass-white);
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 20px;
            cursor: pointer;
            backdrop-filter: blur(55px) saturate(200%);
            -webkit-backdrop-filter: blur(55px) saturate(200%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 25px rgba(255,255,255,0.2);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-fog:hover {
            letter-spacing: 30px;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 80px var(--neon-pink), 0 0 30px #fff;
            transform: translateY(-10px);
        }

        /* --- INFINITE HEAVEN RAYS (FIXED) --- */
        .ray-container {
            position: fixed;
            top: 50%; left: 50%;
            width: 800vw; height: 800vw;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            background: conic-gradient(from 0deg, transparent 0deg, #fff 15deg, transparent 35deg, #fff 60deg, transparent 90deg, #fff 140deg, transparent 180deg);
            filter: blur(100px) brightness(2.5);
        }

        .ray-active { animation: heavenWarp 2.2s forwards ease-in; }

        @keyframes heavenWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            25% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2) rotate(250deg); opacity: 0; }
        }

        /* --- HEAVEN DIARY --- */
        .heaven-logs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #fff;
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .diary-container {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        /* STICKY NOTE WIND SWAY */
        @keyframes diaryFloat {
            0%, 100% { transform: rotate(-1.5deg) translateY(0); }
            50% { transform: rotate(1.5deg) translateY(-15px); }
        }

        .diary-card {
            position: relative;
            width: 650px;
            background: #fff;
            padding: 20px 20px 100px 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            animation: diaryFloat 5s infinite ease-in-out;
        }

        /* NEON TAPE STICKER */
        .tape-sticker {
            position: absolute;
            top: -25px; left: 50%;
            width: 150px; height: 50px;
            background: rgba(255, 45, 149, 0.4); /* Neon Pink Transparent Tape */
            backdrop-filter: blur(3px);
            transform: translateX(-50%) rotate(-3deg);
            border-left: 1px solid rgba(255,255,255,0.5);
            border-right: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 10px rgba(255, 45, 149, 0.2);
            z-index: 10;
        }

        .diary-image {
            width: 100%; height: 450px;
            background: url('Screenshot_28.png') no-repeat center center;
            background-size: cover;
            filter: sepia(0.1) contrast(1.1);
        }

        .diary-text {
            font-family: 'Dancing Script';
            font-size: 2.2rem; text-align: center; margin-top: 30px;
            color: #222;
        }
    </style>
</head>
<body>

    <audio id="windSound" loop>
        <source src="https://www.soundjay.com/nature/wind-01.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-img" id="bg"></div>
    <div class="ray-container" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="diary-container">
            <div class="diary-card">
                <div class="tape-sticker"></div>
                <div class="diary-image"></div>
                <div class="diary-text">Memory Found: Foggy Fights Bar</div>
                <button onclick="location.reload()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:none; border:1px solid #000; cursor:pointer; padding:8px 20px; font-family:'Syne'; letter-spacing:3px;">BACK</button>
            </div>
        </div>
    </div>

    <script>
        function warp() {
            const rays = document.getElementById('rays');
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');
            const wind = document.getElementById('windSound');

            // 1. Play Wind
            wind.volume = 0.4;
            wind.play().catch(e => console.log("Audio needs user interaction"));

            // 2. Trigger Warp
            rays.classList.add('ray-active');
            
            // 3. Blow out Background
            bg.style.filter = 'brightness(25) blur(60px) saturate(0.5)';
            bg.style.transform = 'scale(8)';
            hero.style.opacity = '0';

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 1500);
        }
    </script>
</body>
</html>
