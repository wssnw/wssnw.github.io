<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow: #ff2d95; /* Matches your sunset pink */
            --accent: #00d2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0221;
            font-family: 'Syne', sans-serif;
        }

        /* --- THE BACKGROUND: EMBEDDED DATA --- */
        .bg-canvas {
            position: fixed;
            top: -2%; left: -2%;
            width: 104%; height: 104%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.1) brightness(0.7);
            animation: slowDrift 20s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.05) translate(-1%, -1%); }
        }

        /* --- THE ATMOSPHERE: FOG & SUNRAYS --- */
        .fog-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 60%, rgba(255, 45, 149, 0.2) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            top: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* --- LOGO: NEON LIQUID --- */
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            margin: 0;
            text-shadow: 0 0 10px #fff, 0 0 30px var(--glow), 0 0 60px var(--glow), 0 0 100px var(--glow);
            animation: breathe 4s infinite ease-in-out;
            cursor: default;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0); filter: brightness(1); }
            50% { transform: scale(1.05) translateY(-10px); filter: brightness(1.2) drop-shadow(0 0 30px var(--accent)); }
        }

        /* --- BUTTON: FROSTED GLASS --- */
        .btn-entry {
            margin-top: -10px;
            padding: 15px 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: 0.5s all cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .btn-entry:hover {
            background: #fff;
            color: #000;
            letter-spacing: 25px;
            box-shadow: 0 0 50px var(--glow);
            transform: translateY(-5px);
        }

        /* --- CINEMATIC BORDER --- */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 150%);
            z-index: 6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="fog-layer"></div>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <div class="content">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-entry" onclick="location.reload()">2028</button>
    </div>

</body>
</html>
