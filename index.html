<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Professional Tropical</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-dark: #005f8d;
            --sea-light: #00d2ff;
            --sand-main: #e6be8a;
            --sand-shadow: #d4a36a;
            --glow: #00f2ff;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #001a2d; /* Deep ocean base */
        }

        /* --- SKY GRADIENT --- */
        .sky {
            position: absolute; top: 0; width: 100%; height: 70vh;
            background: linear-gradient(to bottom, #001f3f 0%, #0083b0 70%, #ffdfba 100%);
            z-index: 1;
        }

        /* --- REALISTIC LAYERED WAVES --- */
        .ocean {
            position: absolute; bottom: 20vh; width: 100%; height: 15vh;
            z-index: 3; filter: drop-shadow(0 -5px 15px rgba(0,210,255,0.3));
        }

        .wave-layer {
            position: absolute; bottom: 0; width: 200%; height: 100%;
            background-repeat: repeat-x;
            animation: moveWaves 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            opacity: 0.8;
        }

        .wave-layer.one {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200"><path fill="%2300d2ff" d="M0,100 C200,150 400,50 600,100 C800,150 1000,50 1200,100 C1400,150 1600,50 1600,100 V200 H0 Z" /></svg>');
            z-index: 5; animation-duration: 8s;
        }

        .wave-layer.two {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200"><path fill="%230077be" d="M0,120 C300,70 600,170 900,120 C1200,70 1500,170 1800,120 V200 H0 Z" /></svg>');
            z-index: 4; animation-duration: 12s; opacity: 0.5; bottom: 5px;
        }

        @keyframes moveWaves {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- DETAILED SAND TEXTURE --- */
        .beach {
            position: absolute; bottom: 0; width: 100%; height: 25vh;
            background: var(--sand-main);
            background-image: radial-gradient(var(--sand-shadow) 1px, transparent 0);
            background-size: 4px 4px; /* Tiny sand grain detail */
            z-index: 6;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.2);
        }

        /* --- HAND-CODED SVG PALM TREES --- */
        .palm-container {
            position: absolute; bottom: 22vh; z-index: 7;
            width: 150px; height: 350px; transform-origin: bottom;
            animation: trunkSway 6s infinite ease-in-out;
        }

        .palm-leaves {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            animation: leafSway 3s infinite ease-in-out alternate;
        }

        .palm-trunk {
            width: 25px; height: 300px; background: #5d4037;
            clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
            margin: 0 auto;
            background: linear-gradient(90deg, #4e342e 0%, #6d4c41 50%, #4e342e 100%);
        }

        @keyframes trunkSway {
            0%, 100% { transform: rotate(-1deg); }
            50% { transform: rotate(1.5deg); }
        }

        @keyframes leafSway {
            from { transform: translateX(-50%) rotate(-3deg); }
            to { transform: translateX(-50%) rotate(3deg); }
        }

        /* --- THE LOGO: NEON LIQUID GLOW --- */
        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4.5rem, 16vw, 10rem);
            color: #fff;
            text-align: center;
            /* Multi-layer flickering glow */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px var(--glow),
                0 0 40px var(--glow),
                0 0 80px var(--glow),
                0 0 120px var(--glow);
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; filter: brightness(1); transform: scale(1); }
            50% { opacity: 0.95; filter: brightness(1.2); transform: scale(1.02); }
            98% { opacity: 1; }
            99% { opacity: 0.8; } /* Sudden flicker */
        }

        /* --- COCONUT PHYSICS --- */
        .coconut {
            position: absolute; font-size: 35px; z-index: 10;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.4));
        }

        .sand-impact {
            position: absolute; background: var(--sand-shadow);
            width: 40px; height: 10px; border-radius: 50%;
            opacity: 0.6; z-index: 6; transform: scale(0);
            animation: impact 2s forwards;
        }

        @keyframes impact {
            0% { transform: scale(0); opacity: 0.8; }
            20% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="sky"></div>

    <div class="ocean">
        <div class="wave-layer one"></div>
        <div class="wave-layer two"></div>
    </div>

    <div class="beach" id="beachBody"></div>

    <div class="palm-container" style="left: 5%;">
        <div class="palm-leaves"><svg width="200" height="150" viewBox="0 0 200 150"><path d="M100,50 Q150,0 190,80 Q150,40 100,50 Z" fill="%232e7d32"/><path d="M100,50 Q50,0 10,80 Q50,40 100,50 Z" fill="%231b5e20"/><path d="M100,50 Q100,-20 150,30 Q110,10 100,50 Z" fill="%23388e3c"/></svg></div>
        <div class="palm-trunk"></div>
    </div>

    <div class="content">
        <h1 class="main-logo">Foggy Fights</h1>
        <button style="background:none; border: 2px solid #fff; color:#fff; font-family:'Syne'; padding:10px 30px; letter-spacing:10px; cursor:pointer; margin-top:20px; backdrop-filter:blur(5px);">2028</button>
    </div>

    <script>
        function spawnCoconut() {
            const coco = document.createElement('div');
            coco.className = 'coconut';
            coco.innerHTML = '🥥';
            
            const startX = Math.random() > 0.5 ? 10 : 85; // Drop near trees
            coco.style.left = (startX + (Math.random()*5)) + '%';
            coco.style.top = '15vh';
            document.body.appendChild(coco);

            let posY = 15;
            let velocity = 0;
            const gravity = 0.4;
            const floor = 82; // Beach level

            const fall = setInterval(() => {
                velocity += gravity;
                posY += velocity;
                coco.style.top = posY + 'vh';

                if (posY >= floor) {
                    clearInterval(fall);
                    createImpact(coco.style.left);
                    
                    // Small bounce
                    velocity = -velocity * 0.3; 
                    posY = floor;
                    
                    setTimeout(() => {
                        coco.style.transition = 'opacity 2s';
                        coco.style.opacity = '0';
                        setTimeout(() => coco.remove(), 2000);
                    }, 3000);
                }
            }, 30);
        }

        function createImpact(leftPos) {
            const impact = document.createElement('div');
            impact.className = 'sand-impact';
            impact.style.left = leftPos;
            impact.style.bottom = '17vh';
            document.body.appendChild(impact);
            setTimeout(() => impact.remove(), 2000);
        }

        setInterval(spawnCoconut, 7000); // Drop every 7 seconds
    </script>
</body>
</html>
