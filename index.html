<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff2d95; --neon-blue: #00f2ff; --sunset-purple: #7000ff; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #050112;
            font-family: 'Syne', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- START PAGE BG --- */
        .bg-img {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background: #050112 url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover;
            z-index: 1; filter: contrast(1.1) brightness(0.6);
            transition: transform 4s cubic-bezier(0.19, 1, 0.22, 1), filter 2s;
        }

        .hero {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 15vw, 10rem);
            text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.3); }
        }

        .btn-fog {
            margin-top: 50px; padding: 25px 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #fff; color: #fff;
            text-transform: uppercase; letter-spacing: 15px;
            cursor: pointer; backdrop-filter: blur(20px);
            transition: 0.5s;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.3);
        }

        .btn-fog:hover {
            letter-spacing: 20px; background: #fff; color: #000;
            box-shadow: 0 0 50px var(--sunset-purple);
        }

        /* --- SLOW VISIBLE RAYS --- */
        .ray-box {
            position: fixed; top: 50%; left: 50%;
            width: 1500vw; height: 1500vw;
            transform: translate(-50%, -50%) scale(0);
            background: conic-gradient(from 0deg, transparent 0, rgba(255,255,255,0.8) 5deg, transparent 15deg, rgba(255,255,255,0.8) 30deg, transparent 50deg);
            filter: blur(80px) brightness(1.5);
            z-index: 999; pointer-events: none; opacity: 0;
        }

        .ray-active { animation: slowWarp 4s forwards ease-out; }

        @keyframes slowWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(120deg); opacity: 0; }
        }

        /* --- HEAVEN SECTION --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #fceaff 100%);
            display: none; z-index: 1000;
            overflow-y: auto; padding: 100px 0;
            flex-direction: column; align-items: center;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px; width: 90%; max-width: 1200px;
            margin-bottom: 100px;
        }

        .diary-card {
            position: relative; background: #fff; padding: 15px 15px 60px 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .diary-card:hover { transform: translateY(-10px) rotate(1deg); }

        .tape {
            position: absolute; top: -20px; left: 50%; width: 120px; height: 40px;
            background: rgba(255, 45, 149, 0.3); backdrop-filter: blur(2px);
            transform: translateX(-50%) rotate(-2deg);
        }

        .img-box {
            width: 100%; height: 300px; background: #eee;
            background-size: cover; background-position: center;
        }

        .main-img { background-image: url('Screenshot_28.png'); animation: neonPulse 3s infinite alternate; }
        
        @keyframes neonPulse {
            to { filter: saturate(1.5) drop-shadow(0 0 15px var(--neon-pink)); }
        }

        .empty-slot { display: flex; align-items: center; justify-content: center; color: #ccc; font-style: italic; }

        .memory-info { font-family: 'Dancing Script'; font-size: 1.5rem; color: #222; text-align: center; margin-top: 15px; }

        /* --- SOCIALS & BUTTONS --- */
        .social-box { text-align: center; padding: 50px; background: rgba(0,0,0,0.03); width: 100%; }
        .social-link { 
            display: inline-block; margin: 10px 20px; color: #222; 
            text-decoration: none; font-weight: 600; font-size: 1.2rem;
            transition: 0.3s;
        }
        .social-link:hover { color: var(--neon-pink); }

        .explore-btn {
            padding: 15px 40px; border: 2px solid #000; background: none;
            cursor: pointer; font-family: 'Syne'; font-weight: 800;
            margin-bottom: 50px; transition: 0.3s;
        }
        .explore-btn:hover { background: #000; color: #fff; }
    </style>
</head>
<body>

    <audio id="wind" loop><source src="https://www.soundjay.com/nature/wind-01.mp3" type="audio/mpeg"></audio>

    <div class="bg-img" id="bg"></div>
    <div class="ray-box" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <h2 style="color:#222; font-size: 3rem; margin-bottom: 50px;">Memories Found</h2>
        
        <div class="memory-grid">
            <div class="diary-card">
                <div class="tape"></div>
                <div class="img-box main-img"></div>
                <div class="memory-info">08/15/25</div>
            </div>
            
            <div class="diary-card">
                <div class="tape" style="background:rgba(0,242,255,0.2)"></div>
                <div class="img-box empty-slot">Slot Empty...</div>
                <div class="memory-info">??/??/??</div>
            </div>
            <div class="diary-card">
                <div class="tape"></div>
                <div class="img-box empty-slot">Slot Empty...</div>
                <div class="memory-info">??/??/??</div>
            </div>
            <div class="diary-card">
                <div class="tape" style="background:rgba(0,242,255,0.2)"></div>
                <div class="img-box empty-slot">Slot Empty...</div>
                <div class="memory-info">??/??/??</div>
            </div>
        </div>

        <button class="explore-btn" onclick="alert('Searching deeper into the fog...')">EXPLORE MORE</button>

        <div class="social-box">
            <h3 style="color:#222">Connect</h3>
            <a href="https://instagram.com/promethazine" target="_blank" class="social-link">INSTA: @promethazine</a>
            <a href="https://tiktok.com/@melody" target="_blank" class="social-link">TIKTOK: @melody</a>
            <a href="#" onclick="alert('Coming Soon')" class="social-link">DISCORD SERVER</a>
            <br><br>
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; text-decoration:underline;">Return to Start</button>
        </div>
    </div>

    <script>
        function warp() {
            const wind = document.getElementById('wind');
            wind.volume = 0.2; wind.play().catch(() => {});

            document.getElementById('rays').classList.add('ray-active');
            document.getElementById('bg').style.transform = "scale(12) rotate(20deg)";
            document.getElementById('bg').style.filter = "brightness(40) blur(60px)";
            document.getElementById('hero').style.opacity = "0";

            setTimeout(() => {
                document.getElementById('hero').style.display = 'none';
                document.getElementById('logs').style.display = 'flex';
                document.body.style.overflowY = "auto";
            }, 2000);
        }  
    </script>
</body>
</html>
