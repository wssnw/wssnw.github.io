<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --sakura-light: #ffd1dc;
            --sakura-deep: #ffb7c5;
            --white-glow: rgba(255, 255, 255, 0.9);
            --paper: #fdfaf0;
            --heaven-glow: 0 0 20px rgba(255, 45, 149, 0.6), 0 0 40px rgba(0, 242, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.1);
            --map-cyan: #00f2ff;
        }

        /* --- core reset --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020008; font-family: 'Syne', sans-serif; color: white; overflow: hidden; }

        /* --- bg engine --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2,0,8,0.4), rgba(2,0,8,0.9)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; transform: scale(1.05);
            transition: transform 7s cubic-bezier(0.22, 1, 0.36, 1), filter 5s ease;
        }

        /* --- sakura --- */
        .leaf {
            position: fixed; top: -10%; z-index: 5; width: 18px; height: 22px;
            background: linear-gradient(135deg, var(--sakura-light), var(--sakura-deep));
            clip-path: polygon(50% 15%, 70% 0%, 100% 20%, 90% 60%, 50% 100%, 10% 60%, 0% 20%, 30% 0%);
            animation: fallSway linear infinite; opacity: 0.8; cursor: pointer;
        }
        @keyframes fallSway {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            15% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(120px); opacity: 0; }
        }

        /* --- titles n rgb glow --- */
        .main-logo, .glow-header { font-family: 'Dancing Script', cursive; color: white; text-align: center; animation: rgbPulse 5s linear infinite; }
        .main-logo { font-size: clamp(3.8rem, 16vw, 11rem); animation: floating 4s ease-in-out infinite, rgbPulse 5s linear infinite; margin: 0; z-index: 10; }
        @keyframes rgbPulse {
            0%, 100% { filter: drop-shadow(0 0 15px #ff0000) drop-shadow(0 0 30px var(--neon-pink)); }
            33% { filter: drop-shadow(0 0 15px #00f2ff) drop-shadow(0 0 30px #7000ff); }
            66% { filter: drop-shadow(0 0 15px #48ff00) drop-shadow(0 0 30px #fffb00); }
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- Glassy Map UI (THE NEW GANG) --- */
        #map-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: none; z-index: 3000; justify-content: center; align-items: center;
            opacity: 0; transition: 0.5s ease;
        }

        .map-container {
            width: 95%; max-width: 900px; height: 85vh;
            background: rgba(10, 10, 20, 0.6); border: 1px solid var(--map-cyan);
            border-radius: 10px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .map-header {
            padding: 15px; background: rgba(0, 242, 255, 0.1);
            text-align: center; letter-spacing: 5px; font-weight: 900;
            border-bottom: 1px solid var(--map-cyan); color: var(--map-cyan);
        }

        .map-grid {
            flex-grow: 1; position: relative;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .map-zone {
            position: absolute; border: 1px solid var(--map-cyan);
            background: rgba(0, 242, 255, 0.05); color: var(--map-cyan);
            padding: 8px 12px; font-size: 0.7rem; text-transform: uppercase;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            clip-path: polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%);
        }

        .map-zone:hover { background: var(--map-cyan); color: #000; box-shadow: 0 0 20px var(--map-cyan); transform: scale(1.05); }

        /* Ping Animation */
        .ping {
            position: absolute; width: 20px; height: 20px; border: 2px solid var(--map-cyan);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            animation: pingOut 1s ease-out forwards;
        }
        @keyframes pingOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(6); opacity: 0; } }

        /* --- Original Diary & Story CSS --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(2, 0, 8, 0.85); backdrop-filter: blur(25px);
            display: none; z-index: 1000; overflow-y: scroll; padding: 60px 20px;
            flex-direction: column; align-items: center; opacity: 0; transition: opacity 1s ease;
        }
        .diary-stack { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 45px; margin-bottom: 50px; }
        .diary-card { position: relative; background: var(--paper); padding: 15px 15px 60px 15px; width: 100%; box-shadow: var(--heaven-glow); transform: rotate(-1.5deg); animation: diaryEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes diaryEntry { from { opacity: 0; transform: translateY(100px) rotate(10deg); } to { opacity: 1; transform: translateY(0) rotate(-1.5deg); } }
        .tape { position: absolute; top: -15px; left: 50%; width: 110px; height: 40px; background: rgba(255, 45, 149, 0.9); transform: translateX(-50%) rotate(-4deg); box-shadow: 0 0 15px var(--neon-pink); z-index: 5; }
        .img-box { width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .diary-label { color: #222; font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; margin-top: 20px; font-weight: 800; letter-spacing: 1px; }

        .btn-fancy {
            margin: 10px; padding: 18px 40px; border: 2px solid white;
            background: rgba(255, 255, 255, 0.1); color: white; cursor: pointer;
            letter-spacing: 5px; font-weight: 900; transition: 0.4s;
            backdrop-filter: blur(5px); text-transform: uppercase;
        }
        .btn-fancy:hover { background: white; color: black; box-shadow: 0 0 40px white; }

        .hero { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1.5s ease; }
        #story { display: none; }
        .legacy-text { font-size: clamp(1.2rem, 4vw, 1.8rem); line-height: 1.8; text-shadow: 0 0 20px var(--neon-pink); }
    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div id="leaf-container"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fancy" onclick="godlyEnter()">ENTER THE FOG</button>
        <button class="btn-fancy" style="border-color: var(--map-cyan); color: var(--map-cyan);" onclick="toggleMap(true)">OPEN MAP</button>
        <div class="made-by" style="opacity: 0.4; font-size: 0.7rem; margin-top: 20px; letter-spacing: 2px;">made by wssnw</div>
    </div>

    <div id="map-overlay">
        <div class="map-container">
            <div class="map-header">TACTICAL OVERLAY // 2028</div>
            <div class="map-grid" id="mapGrid">
                <div class="map-zone" style="top:10%; left:10%;" onclick="pingLoc(event)">Uphill</div>
                <div class="map-zone" style="top:15%; left:45%;" onclick="pingLoc(event)">Bank</div>
                <div class="map-zone" style="top:10%; right:10%;" onclick="pingLoc(event)">Casino</div>
                <div class="map-zone" style="top:45%; left:15%;" onclick="pingLoc(event)">Gas Station</div>
                <div class="map-zone" style="top:40%; left:42%; border-color:var(--neon-pink); color:var(--neon-pink);" onclick="pingLoc(event)">The Park</div>
                <div class="map-zone" style="top:45%; right:15%;" onclick="pingLoc(event)">Warehouse</div>
                <div class="map-zone" style="bottom:20%; left:10%;" onclick="pingLoc(event)">Downhill</div>
                <div class="map-zone" style="bottom:15%; left:35%;" onclick="pingLoc(event)">Playground</div>
                <div class="map-zone" style="bottom:35%; right:20%;" onclick="pingLoc(event)">Boxing Ring</div>
                <div class="map-zone" style="bottom:10%; right:10%; border-style: dashed;" onclick="pingLoc(event)">The Beach</div>
            </div>
            <button class="btn-fancy" style="margin: 0; border: none; background: var(--map-cyan); color: #000;" onclick="toggleMap(false)">CLOSE MAP</button>
        </div>
    </div>

    <div class="heaven-logs" id="logs">
        <h2 class="glow-header" style="font-size: 3.5rem; letter-spacing: 10px; margin-bottom: 50px;">MEMORIES</h2>
        <div class="diary-stack">
            <div class="diary-card"><div class="tape"></div><div class="img-box"><img src="Screenshot_22.png"></div><div class="diary-label">11/08/2025</div></div>
            <div class="diary-card" style="transform: rotate(2deg);"><div class="tape" style="background:#00f2ff;"></div><div class="img-box"><img src="RobloxScreenShot20260302_213405110.png"></div><div class="diary-label">9/07/2025</div></div>
        </div>
        <button class="btn-fancy" onclick="openStory()">EXPLORE STORY</button>
        <button class="btn-fancy" style="border:none; opacity:0.5;" onclick="backToHome()">BACK</button>
    </div>

    <div class="heaven-logs" id="story">
        <div style="max-width: 800px; text-align: center; padding: 20px;">
            <h1 class="glow-header" style="font-size: 3.5rem;">THE LEGACY</h1>
            <div class="legacy-text">Inspired by Da Hood. Started at 13. Releasing 2028.</div>
            <button class="btn-fancy" style="margin-top:60px" onclick="backToLogs()">BACK</button>
        </div>
    </div>

    <script>
        // Leaf system
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            leaf.style.left = Math.random() * 100 + 'vw';
            leafContainer.appendChild(leaf);
            setTimeout(() => leaf.remove(), 10000);
        }
        const leafContainer = document.getElementById('leaf-container');
        setInterval(createLeaf, 500);

        // Map logic
        function toggleMap(show) {
            const m = document.getElementById('map-overlay');
            if(show) { m.style.display='flex'; setTimeout(()=>m.style.opacity='1', 10); }
            else { m.style.opacity='0'; setTimeout(()=>m.style.display='none', 500); }
        }

        function pingLoc(e) {
            const rect = document.getElementById('mapGrid').getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const ping = document.createElement('div');
            ping.classList.add('ping');
            ping.style.left = x + 'px';
            ping.style.top = y + 'px';
            document.getElementById('mapGrid').appendChild(ping);
            setTimeout(() => ping.remove(), 1000);
        }

        // Navigation
        function godlyEnter() {
            document.getElementById('bg').style.transform = "scale(2.2) blur(40px)";
            document.getElementById('hero').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('hero').style.display = 'none';
                const logs = document.getElementById('logs');
                logs.style.display = 'flex';
                setTimeout(() => logs.style.opacity = "1", 50);
            }, 2000);
        }

        function openStory() {
            document.getElementById('logs').style.display = 'none';
            document.getElementById('story').style.display = 'flex';
            document.getElementById('story').style.opacity = '1';
        }

        function backToLogs() {
            document.getElementById('story').style.display = 'none';
            document.getElementById('logs').style.display = 'flex';
        }

        function backToHome() {
            location.reload(); // Quick reset for the demo
        }
    </script>
</body>
</html>
