<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foggy Fights | Golden Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #ffb347;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shine: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Syne', sans-serif;
            color: #fff; overflow: hidden;
        }

        /* --- Backgrounds --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover; z-index: 1; transform: scale(1.1);
            filter: sepia(0.3) saturate(1.2);
            transition: all 4.5s cubic-bezier(0.1, 0, 0, 1);
        }

        /* --- THE SHINING LOGO --- */
        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 15vw, 9rem);
            background: linear-gradient(90deg, #fff 0%, var(--gold) 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoSweep 3s linear infinite, float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 179, 71, 0.4));
        }

        @keyframes logoSweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* --- GLASS BUTTONS --- */
        .glass-btn {
            position: relative; padding: 22px 60px; font-weight: 900;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); color: #fff;
            border-radius: 12px; cursor: pointer; letter-spacing: 4px;
            overflow: hidden; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
            font-size: 14px; text-transform: uppercase;
        }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: var(--gold); transform: translateY(-3px); }

        /* --- AI ASSISTANT --- */
        #ai-bot {
            position: fixed; bottom: 25px; right: 25px; z-index: 10006;
            width: 60px; height: 60px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.5s; font-size: 24px;
        }
        #ai-bot:hover { transform: scale(1.1) rotate(10deg); border-color: var(--gold); }

        #ai-chat {
            position: fixed; bottom: 100px; right: 25px; width: 300px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; display: none; z-index: 10006; flex-direction: column; gap: 10px;
        }

        /* --- Legacy Content --- */
        .heaven-logs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop');
            background-size: cover; display: none; z-index: 10003; 
            overflow-y: auto; padding: 60px 20px; flex-direction: column; align-items: center;
            opacity: 0; transition: 3s ease;
        }

        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 10; transition: 2s; }
    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>

    <div id="ai-bot" onclick="toggleChat()">✨</div>
    <div id="ai-chat">
        <div style="font-weight: 900; color: var(--gold); border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;">Foggy Assistant</div>
        <div id="chat-res" style="font-size: 13px; line-height: 1.5;">Welcome! Ask me about the legacy.</div>
        <input type="text" id="ai-input" placeholder="Type..." style="background:transparent; border:1px solid var(--gold); color:white; padding:5px; border-radius:5px;" onkeypress="if(event.key === 'Enter') askAI()">
    </div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="glass-btn" onclick="startCinematic()">Enter the Fog</button>
        
        <div style="display:flex; gap:30px; margin-top:50px;">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670157.png" style="width:40px; cursor:pointer;" onclick="alert('Discord Soon!')" alt="Discord">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" style="width:40px; cursor:pointer;" onclick="window.open('https://www.roblox.com/communities/35978868')" alt="Roblox">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" style="width:40px; cursor:pointer;" onclick="alert('TikTok Soon!')" alt="TikTok">
        </div>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="hero">
            <h2 style="color:var(--gold); font-family:'Dancing Script'; font-size: 4rem;">The Legacy</h2>
            <p style="max-width: 600px; line-height: 2; text-align: center;">
                Inspired by <b>Da Hood</b>. What started as a solo vision in 2025 has grown. 
                Life happens, so we are aiming for <b>2028</b> for the ultimate release.
            </p>
            <button class="glass-btn" onclick="location.reload()">Return Home</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            const chat = document.getElementById('ai-chat');
            chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
        }

        function askAI() {
            const input = document.getElementById('ai-input');
            const res = document.getElementById('chat-res');
            const val = input.value.toLowerCase();
            
            if(val.includes('release')) res.innerText = "Foggy Fights is projected to release in 2028!";
            else if(val.includes('hood')) res.innerText = "The game is heavily inspired by the vibes of Da Hood.";
            else if(val.includes('who')) res.innerText = "I am the Foggy Assistant, here to help you navigate the memory lane.";
            else res.innerText = "I'm still learning! Ask about the release date or inspiration.";
            input.value = "";
        }

        function startCinematic() {
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');

            bg.style.transform = "scale(100) rotate(15deg)";
            bg.style.filter = "brightness(50) blur(150px) sepia(1)";
            hero.style.opacity = "0";

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'flex';
                setTimeout(() => { logs.style.opacity = "1"; }, 100);
            }, 3500);
        }
    </script>
</body>
</html>
