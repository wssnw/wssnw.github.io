<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Internal Docs</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #ffb347;
            --gold-glow: rgba(255, 179, 71, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Syne', sans-serif;
            color: #fff; overflow-x: hidden;
        }

        /* --- THE RIGHT-TO-LEFT SWEEP (STILL HITTING HARD) --- */
        .sweep {
            position: fixed; top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(110deg, transparent 20%, rgba(255,255,255,0.15) 50%, transparent 80%);
            z-index: 100; pointer-events: none;
            animation: sweepRightToLeft 5s ease-in-out infinite;
            filter: blur(80px);
        }

        @keyframes sweepRightToLeft {
            0% { transform: translateX(80%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(-120%); opacity: 0; }
        }

        /* --- THE BG --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)), 
                        url('IMG_3002.jpeg') center/cover no-repeat;
            z-index: 1; filter: sepia(0.5) brightness(0.6);
        }

        /* --- LOGO AT TOP --- */
        .header {
            position: relative; z-index: 10; text-align: center; padding-top: 50px;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 6rem;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold-glow);
            margin: 0;
        }

        /* --- THE "SHIT" MEMORIES LAYOUT (MESSY) --- */
        .memories-folder {
            position: relative; z-index: 10;
            width: 100%; max-width: 1200px;
            margin: 100px auto;
            display: flex; flex-wrap: wrap; justify-content: space-around;
            padding: 20px;
        }

        .raw-photo {
            background: #eee;
            padding: 10px 10px 40px 10px;
            box-shadow: 10px 20px 50px rgba(0,0,0,0.8);
            margin: -20px; /* Overlap them like shit */
            border: 1px solid #ccc;
            transition: 0.3s;
            cursor: move;
        }

        .raw-photo img {
            width: 250px; height: auto; display: block;
            filter: saturate(1.2) contrast(1.1);
        }

        .raw-photo p {
            color: #111; font-family: 'Dancing Script';
            font-size: 1.2rem; margin-top: 10px; text-align: center;
        }

        /* RANDOM SHIT ROTATIONS */
        .p1 { transform: rotate(-8deg); }
        .p2 { transform: rotate(12deg) translateY(50px); }
        .p3 { transform: rotate(-3deg) translateX(-30px); }
        .p4 { transform: rotate(5deg) translateY(-20px); }

        .raw-photo:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 500;
            background: #fff;
        }

        .doc-label {
            width: 100%; text-align: center; color: var(--gold);
            font-family: monospace; opacity: 0.5; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="sweep"></div>
    <div class="bg-img"></div>

    <div class="header">
        <h1 class="main-logo">Foggy Fights</h1>
        <p class="doc-label">[ MEMORY_DUMP_V1_2025 ]</p>
    </div>

    <div class="memories-folder">
        <div class="raw-photo p1">
            <img src="Screenshot_22.png">
            <p>raw_spark.png</p>
        </div>

        <div class="raw-photo p2">
            <img src="RobloxScreenShot20260302_213405110.png">
            <p>golden_test_01.png</p>
        </div>

        <div class="raw-photo p3">
            <img src="Screenshot_22.png">
            <p>temp_backup.png</p>
        </div>

        <div class="raw-photo p4">
            <img src="RobloxScreenShot20260302_213405110.png">
            <p>unnamed_file.png</p>
        </div>
    </div>

    <div style="height: 200px;"></div>

</body>
</html>
