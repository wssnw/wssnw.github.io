<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --heaven-white: #ffffff;
            --gold-glow: #ffdfba;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0221;
            font-family: 'Syne', sans-serif;
        }

        /* --- THE MASTER IMAGE --- */
        .bg-img {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.1) brightness(0.7);
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1), filter 2s;
        }

        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        /* --- THE ORIGINAL GOATED GLOWING LOGO --- */
        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            margin: 0;
            /* Heavy multi-layer glow */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-pink),
                0 0 80px var(--neon-pink),
                0 0 120px var(--neon-pink);
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); }
        }

        /* --- GLASSIER 2028 BUTTON (MOVED DOWN) --- */
        .btn-2028 {
            margin-top: 120px; /* Pushed way down */
            padding: 22px 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 20px;
            cursor: pointer;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-2028:hover {
            letter-spacing: 30px;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 50px #fff;
            transform: translateY(-5px) scale(1.05);
        }

        /* --- THE HEAVENLY TRANSITION --- */
        .sunray-burst {
            position: fixed;
            top: 50%; left: 50%;
            width: 1px; height: 1px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 0 100px 100px #fff, 0 0 300px 200px var(--gold-glow);
            opacity: 0;
        }

        .sunray-burst.active {
            animation: heavenFlash 1.5s forwards ease-in;
        }

        @keyframes heavenFlash {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2500); opacity: 0; }
        }

        /* --- THE HEAVEN LOGS --- */
        .heaven-logs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(to bottom, #fff, var(--gold-glow));
            display: none;
            z-index: 1000;
            overflow-y: auto;
            color: #222;
            padding: 80px 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .log-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry {
            margin-bottom: 60px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 20px;
        }

        .log-date { font-weight: 600; color: #888; font-size: 0.9rem; letter-spacing: 2px; }
        .log-title { font-family: 'Syne'; font-size: 2.5rem; margin: 10px 0; color: #000; }
        .log-body { font-size: 1.1rem; line-height: 1.8; color: #444; }

    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="sunray-burst" id="ray"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-2028" onclick="ascend()">2028</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="log-container">
            <div class="log-entry">
                <div class="log-date">ENTRY #001 // 2026</div>
                <h2 class="log-title">THE GENESIS</h2>
                <p class="log-body">The vision is locked. We are building the atmosphere, the fight, and the fog. This is the start of the 2028 cycle.</p>
            </div>

            <div class="log-entry">
                <div class="log-date">ENTRY #002 // FUTURE</div>
                <h2 class="log-title">BEYOND THE MIST</h2>
                <p class="log-body">Everything you see here is a fragment of the final world. Stay tuned to the frequency.</p>
            </div>

            <button onclick="location.reload()" style="background:none; border:1px solid #000; color:#000; padding:15px 30px; cursor:pointer; font-family:'Syne'; letter-spacing:5px; margin-top:40px;">RETURN TO MIST</button>
        </div>
    </div>

    <script>
        function ascend() {
            const ray = document.getElementById('ray');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');
            const bg = document.getElementById('bg');

            // Trigger Crazy Sunrays
            ray.classList.add('active');
            bg.style.filter = 'brightness(5) white-balance(200%)';
            bg.style.transform = 'scale(2)';
            
            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 800);
        }
    </script>
</body>
</html>
