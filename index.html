<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Montserrat:wght@300;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff00ff;
            --sun-gold: #ffcc00;
            --bg: #030303;
        }

        body {
            background: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; opacity: 0.6; }

        /* Smooth Hero Section */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.8s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 10rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.5));
            animation: logoFloat 6s infinite ease-in-out;
        }

        /* Clicking this triggers the "Boss" effect */
        .release-trigger {
            margin-top: -20px;
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 15px;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            padding: 20px;
            transition: letter-spacing 0.5s cubic-bezier(0.23, 1, 0.32, 1), filter 0.3s;
        }

        .release-trigger:hover {
            letter-spacing: 25px;
            filter: drop-shadow(0 0 10px var(--neon-pink));
        }

        /* The Sunray Expansion (Smoothed with Blurs) */
        .sun-expansion {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: var(--sun-gold);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 99;
            pointer-events: none;
            filter: blur(20px);
            box-shadow: 0 0 200px 100px var(--sun-gold);
        }

        .sun-expansion.active {
            animation: sunBurst 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        /* Diary - Glassmorphism Aesthetic */
        .diary-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(3, 3, 3, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .diary-content {
            max-width: 900px;
            margin: 100px auto;
            padding: 40px;
        }

        .entry {
            margin-bottom: 100px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .entry.visible { opacity: 1; transform: translateY(0); }

        .entry h2 { font-family: 'Syne', sans-serif; font-size: 3rem; color: var(--neon-blue); margin-bottom: 10px; }
        .entry p { font-size: 1.2rem; line-height: 1.8; color: #ccc; font-weight: 300; }
        
        .entry img {
            width: 100%;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.5s;
        }

        .entry img:hover { transform: scale(1.02); }

        /* Animations */
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-25px) rotate(1deg); }
        }

        @keyframes sunBurst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(600); opacity: 0; }
        }

        /* Scrollbar Hide */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>
    <div class="sun-expansion" id="sun"></div>

    <div class="container" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="release-trigger" onclick="launchDiary()">2028</button>
    </div>

    <div class="diary-overlay" id="diary">
        <div class="diary-content">
            <div class="entry" id="e1">
                <h2>THE VISION</h2>
                <p>Foggy Fights isn't just a project. It's the mist that consumes everything.</p>
                <img src="Screenshot_28.png" alt="FF Entry 1">
            </div>

            <div class="entry" id="e2">
                <h2>THE DIARY</h2>
                <p>2028 is the year the world changes. Recorded in the shadows.</p>
                </div>

            <button onclick="window.location.reload()" style="background:none; border: 1px solid white; color:white; padding: 15px 30px; cursor:pointer; font-family:'Syne';">REBOOT SYSTEM</button>
        </div>
    </div>

    <script>
        function launchDiary() {
            const sun = document.getElementById('sun');
            const hero = document.getElementById('hero');
            const diary = document.getElementById('diary');

            sun.classList.add('active');
            hero.style.opacity = '0';
            hero.style.transform = 'scale(0.9)';

            setTimeout(() => {
                diary.style.display = 'block';
                setTimeout(() => { 
                    diary.style.opacity = '1'; 
                    document.getElementById('e1').classList.add('visible');
                    document.getElementById('e2').classList.add('visible');
                }, 50);
            }, 800);
        }

        // Professional Snow System
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()*1+0.5});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y += p.s; if(p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
