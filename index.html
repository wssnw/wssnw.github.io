<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-pink: #ff2d95; 
            --neon-blue: #00f2ff; 
            --white-glow: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; cursor: crosshair; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #020008;
            font-family: 'Syne', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- BG TRANSITION --- */
        .bg-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2,0,8,0.5), rgba(2,0,8,0.8)), 
                        url('IMG_3002.jpeg') no-repeat center center;
            background-size: cover;
            z-index: 1; transform: scale(1);
            transition: transform 7s cubic-bezier(0.2, 1, 0.3, 1), filter 5s ease;
        }

        /* --- CINEMATIC SLOW WARP --- */
        .ray-box {
            position: fixed; top: 50%; left: 50%;
            width: 200vmax; height: 200vmax;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(circle, transparent 20%, var(--white-glow) 21%, transparent 25%);
            background-size: 8% 8%;
            opacity: 0; z-index: 9999; pointer-events: none;
        }
        .ray-active { animation: slowGodWarp 5.5s cubic-bezier(0.15, 0, 0.2, 1) forwards; }

        @keyframes slowGodWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(6) rotate(120deg); opacity: 0; }
        }

        /* --- SECTION ENGINE --- */
        .section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: none; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .active { display: flex !important; opacity: 1; }

        /* --- RGB STORY TEXT --- */
        .rgb-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            text-align: center;
            background: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rgbShift 8s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            line-height: 1.4; padding: 20px;
        }
        @keyframes rgbShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* --- BUTTONS --- */
        .btn-fog {
            padding: 20px 50px; border: 2px solid #fff;
            background: none; color: #fff; font-weight: 900;
            letter-spacing: 5px; cursor: pointer; transition: 0.4s;
            text-transform: uppercase;
        }
        .btn-fog:hover { background: #fff; color: #000; box-shadow: 0 0 40px #fff; }

        .diary-card {
            background: white; padding: 10px 10px 50px 10px;
            width: 320px; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            transform: rotate(-2deg); transition: 0.5s;
        }
        .diary-card:hover { transform: scale(1.1) rotate(2deg); }

        .social-link img { width: 50px; margin: 0 20px; filter: invert(1); transition: 0.3s; }
        .social-link img:hover { transform: scale(1.3); filter: drop-shadow(0 0 15px var(--neon-blue)); }

    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="ray-box" id="rays"></div>

    <div class="section active" id="hero">
        <h1 style="font-family:'Dancing Script'; font-size: 8rem; text-shadow: 0 0 40px var(--neon-pink);">Foggy Fights</h1>
        <button class="btn-fog" onclick="enterFog()">Enter the Fog</button>
    </div>

    <div class="section" id="gallery">
        <h2 style="font-size: 3rem; margin-bottom: 40px; text-shadow: 0 0 20px var(--neon-blue);">MEMORIES</h2>
        <div class="diary-card">
            <div style="height:300px; background:url('Screenshot_28.png') center/cover;"></div>
            <p style="color:black; font-family:'Dancing Script'; text-align:center; font-size: 1.8rem;">08/15/25</p>
        </div>
        <button class="btn-fog" style="margin-top:40px" onclick="navTo('story')">Explore Story</button>
        <button class="btn-fog" style="border:none; font-size:0.8rem;" onclick="navBack('hero')">Back</button>
    </div>

    <div class="section" id="story">
        <div class="rgb-text">
            This game was inspired from a game that i played called da hood.<br><br>
            i started this at 13-14 alone and tried to release the game in 2025 but it took alot of time so i set it to 2026<br><br>
            and now its probably going to get released in 2028 since im busy with life.
        </div>
        
        <div style="margin-top:50px;">
            <a class="social-link" href="https://tiktok.com/@melody" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
            <a class="social-link" href="https://instagram.com/promethazine" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
            <a class="social-link" href="https://www.roblox.com/users/3295874241/profile" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1018/1018285.png"></a>
        </div>

        <button class="btn-fog" style="margin-top:50px;" onclick="navBack('gallery')">Back to Gallery</button>
    </div>

    <script>
        function enterFog() {
            document.getElementById('rays').classList.add('ray-active');
            document.getElementById('bg').style.transform = "scale(10) rotate(15deg)";
            document.getElementById('bg').style.filter = "brightness(20) blur(50px)";
            
            document.getElementById('hero').style.opacity = "0";
            
            setTimeout(() => {
                document.getElementById('hero').classList.remove('active');
                const gallery = document.getElementById('gallery');
                gallery.classList.add('active');
            }, 1800); 
        }

        function navTo(id) {
            const current = document.querySelector('.section.active');
            current.style.opacity = "0";
            current.style.transform = "scale(0.9)";
            
            setTimeout(() => {
                current.classList.remove('active');
                const next = document.getElementById(id);
                next.classList.add('active');
                next.style.transform = "scale(1)";
                next.style.opacity = "1";
            }, 600);
        }

        function navBack(id) {
            const current = document.querySelector('.section.active');
            current.style.opacity = "0";
            current.style.transform = "scale(1.1)"; // Scale up when going back
            
            setTimeout(() => {
                current.classList.remove('active');
                const next = document.getElementById(id);
                next.classList.add('active');
                
                if(id === 'hero') {
                    // Reset BG if going back to start
                    document.getElementById('bg').style.transform = "scale(1)";
                    document.getElementById('bg').style.filter = "brightness(1) blur(0px)";
                    document.getElementById('rays').classList.remove('ray-active');
                }
            }, 600);
        }
    </script>
</body>
</html>
