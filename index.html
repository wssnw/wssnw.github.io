<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #ffb347;
            --gold-hot: #fff5e6;
            --gold-glow: rgba(255, 179, 71, 0.4);
        }

        /* Documentation Style: Pure Black Background */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- THE RIGHT-TO-LEFT SWEEP (GLOW ONLY) --- */
        .sweep-overlay {
            position: fixed; top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(110deg, 
                transparent 30%, 
                rgba(255, 215, 100, 0.1) 45%, 
                rgba(255, 255, 255, 0.2) 50%, 
                rgba(255, 215, 100, 0.1) 55%, 
                transparent 70%);
            z-index: 5; pointer-events: none;
            animation: sweepRightToLeft 6s ease-in-out infinite;
            filter: blur(60px);
        }

        @keyframes sweepRightToLeft {
            0% { transform: translateX(60%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(-110%); opacity: 0; }
        }

        /* --- THE LOGO --- */
        .logo-wrap {
            position: relative; z-index: 10;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 25vw, 15rem);
            /* Metallic Gradient Stack */
            background: linear-gradient(to bottom, 
                #fff 0%, 
                var(--gold) 45%, 
                #8b5a00 55%, 
                var(--gold-hot) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Heavy 3D Shadows */
            filter: drop-shadow(0 0 10px rgba(0,0,0,1)) 
                    drop-shadow(0 30px 50px rgba(0,0,0,0.9))
                    drop-shadow(0 0 40px var(--gold-glow));
            animation: float 6s ease-in-out infinite, shimmer 4s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        /* Optional Branding Subtext */
        .doc-tag {
            position: fixed; bottom: 30px; left: 30px;
            color: rgba(255,255,255,0.2);
            font-family: monospace; font-size: 12px;
            letter-spacing: 4px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="sweep-overlay"></div>

    <div class="logo-wrap">
        <h1 class="main-logo">Foggy Fights</h1>
    </div>

    <div class="doc-tag">Asset_01 // Core_Logo // Final_Build_2028</div>

</body>
</html>
