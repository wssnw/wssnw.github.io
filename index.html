<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #ffb347;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --blur: blur(15px);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: 'Syne', sans-serif;
            color: #fff; overflow-x: hidden;
        }

        /* --- THE SWEEP (RIGHT TO LEFT) --- */
        .sweep {
            position: fixed; top: 0; left: 0; width: 200%; height: 100%;
            background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.2) 50%, transparent 75%);
            z-index: 100; pointer-events: none;
            animation: sweepRightToLeft 7s ease-in-out infinite;
            filter: blur(60px);
        }

        @keyframes sweepRightToLeft {
            0% { transform: translateX(60%); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateX(-110%); opacity: 0; }
        }

        /* --- BEACH BACKGROUND --- */
        .beach-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: 1; filter: saturate(1.2) brightness(0.8);
        }

        /* --- THE LOGO --- */
        .header {
            position: relative; z-index: 10; text-align: center; padding-top: 60px;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 12vw, 8rem);
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 179, 71, 0.5);
            margin: 0;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- GLASSY MEMORIES --- */
        .glass-gallery {
            position: relative; z-index: 10;
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 40px; padding: 80px 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            padding: 15px 15px 45px 15px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: rotate(var(--r));
            transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .glass-card:hover {
            transform: scale(1.1) rotate(0deg);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--gold);
            z-index: 50;
        }

        .glass-card img {
            width: 280px; border-radius: 2px;
            filter: brightness(1.1) contrast(1.05);
        }

        .glass-card p {
            font-family: 'Dancing Script';
            color: #fff; font-size: 1.5rem;
            text-align: center; margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .doc-tag {
            width: 100%; text-align: center; color: #fff;
            font-family: monospace; opacity: 0.4; font-size: 10px;
            letter-spacing: 5px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sweep"></div>
    <div class="beach-bg"></div>

    <div class="header">
        <h1 class="main-logo">Foggy Fights</h1>
        <div class="doc-tag">GLASS_COLLECTION // ARCHIVE_01</div>
    </div>

    <div class="glass-gallery">
        <div class="glass-card" style="--r: -5deg;">
            <img src="Screenshot_22.png" alt="Memory 1">
            <p>The Spark</p>
        </div>

        <div class="glass-card" style="--r: 3deg;">
            <img src="RobloxScreenShot20260302_213405110.png" alt="Memory 2">
            <p>Golden Era</p>
        </div>

        <div class="glass-card" style="--r: -2deg;">
            <img src="Screenshot_22.png" alt="Memory 3">
            <p>Legacy</p>
        </div>
    </div>

    <div style="height: 150px;"></div>

</body>
</html>
