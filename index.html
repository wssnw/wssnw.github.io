<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --heaven-glow: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050112;
            font-family: 'Syne', sans-serif;
        }

        /* --- BACKGROUND --- */
        .bg-img {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.2) brightness(0.6);
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1), filter 1.5s;
        }

        /* --- NEON LOGO --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 30px var(--neon-pink), 0 0 60px var(--neon-pink), 0 0 100px var(--neon-pink);
            animation: ultraBreathe 4s infinite ease-in-out;
        }

        @keyframes ultraBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.4); }
        }

        /* --- CRYSTAL GLASS BUTTON --- */
        .btn-fog {
            margin-top: 140px;
            padding: 25px 80px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 20px;
            cursor: pointer;
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.2);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-fog:hover {
            letter-spacing: 30px;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 80px var(--neon-pink);
            transform: translateY(-10px);
        }

        /* --- INFINITE HEAVEN RAYS --- */
        .ray-container {
            position: fixed;
            top: 50%; left: 50%;
            width: 600vw; height: 600vw;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            background: conic-gradient(from 0deg, transparent 0deg, #fff 10deg, transparent 20deg, #fff 45deg, transparent 70deg, #fff 90deg, transparent 120deg);
            filter: blur(80px) brightness(2);
        }

        .ray-active { animation: heavenWarp 2s forwards ease-in; }

        @keyframes heavenWarp {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(220deg); opacity: 0; }
        }

        /* --- HEAVEN DIARY --- */
        .heaven-logs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #fff;
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .diary-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        /* WIND SWAY ANIMATION */
        @keyframes windSway {
            0%, 100% { transform: rotate(-1deg) translateY(0); }
            50% { transform: rotate(1deg) translateY(-10px); }
        }

        .diary-card {
            position: relative;
            width: 600px;
            background: #fff;
            padding: 15px 15px 80px 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: windSway 4s infinite ease-in-out;
        }

        /* THE STICKY NOTE / TAPE */
        .tape {
            position: absolute;
            top: -20px; left: 50%;
            width: 120px; height: 40px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            transform: translateX(-50%) rotate(-2deg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .diary-image {
            width: 100%; height: 400px;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
        }

        .diary-text {
            font-family: 'Dancing Script';
            font-size: 2rem; text-align: center; margin-top: 20px;
        }
    </style>
</head>
<body>

    <audio id="windSound" loop>
        <source src="https://www.soundjay.com/nature/wind-01.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-img" id="bg"></div>
    <div class="ray-container" id="rays"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-fog" onclick="warp()">Enter the Fog!</button>
    </div>

    <div class="heaven-logs" id="logs">
        <div class="diary-container">
            <div class="diary-card">
                <div class="tape"></div>
                <div class="diary-image"></div>
                <div class="diary-text">Memory #001: The Eternal Beach</div>
                <button onclick="location.reload()" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:none; border:1px solid #000; cursor:pointer; padding:5px 15px;">Return</button>
            </div>
        </div>
    </div>

    <script>
        function warp() {
            const rays = document.getElementById('rays');
            const bg = document.getElementById('bg');
            const hero = document.getElementById('hero');
            const logs = document.getElementById('logs');
            const wind = document.getElementById('windSound');

            // 1. Play Wind Audio
            wind.volume = 0.5;
            wind.play();

            // 2. Infinite Rays
            rays.classList.add('ray-active');
            
            // 3. Blow out
            bg.style.filter = 'brightness(20) blur(50px)';
            bg.style.transform = 'scale(7)';
            hero.style.opacity = '0';

            setTimeout(() => {
                hero.style.display = 'none';
                logs.style.display = 'block';
                document.body.style.background = "#fff";
            }, 1400);
        }
    </script>
</body>
</html>
