<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foggy Fights | 2028</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-pink: #ff2d95;
            --glass-bright: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0d0221;
            font-family: 'Syne', sans-serif;
            color: white;
        }

        /* --- THE BACKGROUND --- */
        .bg-img {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: url('https://raw.githubusercontent.com/wssnw/wssnw.github.io/main/IMG_3002.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: contrast(1.1) brightness(0.7);
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* --- THE GLASS BUTTON (EXTRA GLASSIER) --- */
        .btn-glass {
            margin-top: 80px; /* More space below logo */
            padding: 20px 70px;
            background: var(--glass-bright);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 18px;
            cursor: pointer;
            backdrop-filter: blur(30px) saturate(150%); /* Super Glassy */
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                        inset 0 0 15px rgba(255, 255, 255, 0.2);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            z-index: 100;
        }

        .btn-glass:hover {
            letter-spacing: 25px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 40px var(--glow-pink);
            transform: scale(1.05);
        }

        /* --- THE TRANSITION (SUNRAYS) --- */
        .sunray-flash {
            position: fixed;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 0 100px 50px #fff, 0 0 200px 100px var(--glow-pink);
        }

        .sunray-flash.active {
            animation: flashExpand 1.2s forwards cubic-wheel;
        }

        @keyframes flashExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(800); opacity: 0; }
        }

        /* --- DIARY SECTION --- */
        .diary-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #000;
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        .diary-card {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(20, 20, 20, 1);
            border: 1px solid #333;
            padding: 40px;
            border-radius: 15px;
        }

        /* --- UTILITY --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(5rem, 18vw, 11rem);
            text-shadow: 0 0 30px var(--glow-pink);
        }
    </style>
</head>
<body>

    <div class="bg-img" id="bg"></div>
    <div class="sunray-flash" id="flash"></div>

    <div class="hero" id="hero">
        <h1 class="main-logo">Foggy Fights</h1>
        <button class="btn-glass" onclick="triggerSunray()">2028</button>
    </div>

    <div class="diary-overlay" id="diary">
        <div class="diary-card">
            <h1 style="font-family:'Syne'; color:var(--glow-pink); letter-spacing: 5px;">THE LOGS</h1>
            <hr style="border: 0.5px solid #444; margin: 30px 0;">
            <p style="line-height: 1.8; color: #ccc;">Welcome to the inner circle. The Foggy Fights 2028 roadmap starts here.</p>
            <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:10px 20px; cursor:pointer; margin-top:50px;">BACK</button>
        </div>
    </div>

    <script>
        function triggerSunray() {
            const flash = document.getElementById('flash');
            const hero = document.getElementById('hero');
            const diary = document.getElementById('diary');
            const bg = document.getElementById('bg');

            // Start the flash
            flash.classList.add('active');
            bg.style.transform = 'scale(1.5)';
            
            setTimeout(() => {
                hero.style.display = 'none';
                diary.style.display = 'block';
                window.scrollTo(0,0);
            }, 700);
        }
    </script>
</body>
</html>
